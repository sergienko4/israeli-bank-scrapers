# CodeRabbit AI PR Review Configuration
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en
reviews:
  # Auto-review every PR
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Review profile: assertive catches more issues
  profile: assertive

  # What to include in reviews
  path_instructions:
    - path: "src/Scrapers/**"
      instructions: >
        Bank scraper code. Check for: hardcoded CSS/ID selectors (must use visible text),
        missing error handling, methods over 20 lines, any types, fetch pattern violations
        (browser scrapers must use fetchPostWithinPage/fetchGetWithinPage, not native fetch).
    - path: "src/Common/**"
      instructions: >
        Shared infrastructure. Check for: breaking changes to public API,
        missing JSDoc on exported functions, max 3 params per function.
    - path: ".github/**"
      instructions: >
        CI/CD workflows. Check for: missing timeout-minutes, unpinned actions,
        overly broad permissions, missing set -euo pipefail in shell scripts.
    - path: "src/Scrapers/Pipeline/**"
      instructions: >
        Pipeline code. When this PR adds a new exported symbol
        (function, class, interface, type, const) in this tree,
        verify there is a corresponding mention in docs/**/*.md
        (a new file under docs/observability/, docs/architecture/,
        docs/phases/, docs/banks/, etc., or an edit to an existing
        page). TypeDoc auto-flows from JSDoc on /api/, but the
        mkdocs user guide (docs/) is hand-authored — flag the PR
        when a user-visible behaviour change ships without a
        docs/ update.
    - path: "docs/**"
      instructions: >
        mkdocs user guide. Check for: links that 404 (Lychee runs
        on CI), undefined cross-references (mkdocs build --strict
        rejects), and pages added without a corresponding nav entry
        in mkdocs.yml.

  # Don't review these paths
  path_filters:
    - "!**/node_modules/**"
    - "!**/lib/**"
    - "!package-lock.json"
    - "!CHANGELOG.md"

  # Request changes on high-severity issues
  request_changes_workflow: true

  # Collapse walkthrough for large PRs
  collapse_walkthrough: true

chat:
  auto_reply: true
