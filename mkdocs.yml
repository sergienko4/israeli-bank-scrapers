site_name: Israeli Bank Scrapers
site_description: Scrape transactions from 19 Israeli banks and credit card companies with built-in Cloudflare WAF bypass and end-to-end PII redaction.
site_url: https://sergienko4.github.io/israeli-bank-scrapers/
repo_url: https://github.com/sergienko4/israeli-bank-scrapers
repo_name: sergienko4/israeli-bank-scrapers
edit_uri: edit/main/docs/
copyright: |
  &copy; <a href="https://github.com/sergienko4">sergienko4</a> &middot; MIT &middot; based on <a href="https://github.com/eshaham/israeli-bank-scrapers">eshaham/israeli-bank-scrapers</a>

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

hooks:
  - mkdocs_hooks/branch_substitution.py

plugins:
  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - mermaid2
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true
      fallback_to_build_date: true
      # Demote "no git logs" from WARNING to INFO so `mkdocs build
      # --strict` doesn't false-fail on the FIRST commit that adds a
      # brand-new .md file (the file has no git history *yet* — that
      # is the natural state during the pre-commit hook). Broken
      # links / dead nav / unknown plugin keys still abort under
      # --strict; this only silences the inherent chicken-and-egg
      # warning. Documented in Phase 8 PR #279 (F4 docs page).
      strict: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: ['docs', '.']
      check_paths: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sergienko4/israeli-bank-scrapers
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@sergienko4/israeli-bank-scrapers
  status:
    new: New in v8.4
    deprecated: Legacy — scheduled for migration to Pipeline

