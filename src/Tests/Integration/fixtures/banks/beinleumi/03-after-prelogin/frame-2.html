          $('body').addClass('desktop-body');

                showServerConnectionError();

          } else {
            showServerConnectionError();
          }

        function enableLoginBtn() {
          window.submitLoginForm = false;
          $('#continueBtn').prop('disabled', false);
        }

        function disableLoginBtn() {
          window.submitLoginForm = true;

        function hideLoginErrors() {
          if ($('#validationMsg:visible').length == 1) {
            $('#validationMsg').remove();
          }
          if ($('#serverErrorMsg:visible').length == 1) {
            $('#serverErrorMsg').remove();
          }
          if ($('#blockErrorMsg:visible').length == 1) {
            $('#blockErrorMsg').hide().removeAttr('role');
          }
          if ($('#serverErrorMsgTransmit:visible').length == 1) {
            $('#serverErrorMsgTransmit').remove();
          }
        }

        //Login
        function login(token) {
          $('#user').val($('#username').val());
          cleanLoginForm();
          $('#passwordEnc').val(token);
          if ($('#passwordEnc').val().length > 0) {
            $('#login-body').hide();
            $('#loginServlet').submit();
          } else {
            window.loginError = true;
            cleanLoginForm();
            $('.ErrorHolder').append(inputValidationMsg);
            enableLoginBtn();
          }
        }

        //Login Input validation
        function checkInputValidations() {
          window.loginError = false;
          if (
            $('#username').valid() &&
            $('#password').valid() &&
            $('#username').val().length > 2 &&
            $('#password').val().length > 3
          ) {
            $('#inputValidationMsg').remove();
            return true;
          } else {
            $('.ErrorHolder').append(inputValidationMsg);
            if ($('#username').hasClass('error') && $('#password').hasClass('error')) {
              $('#username').attr(
                'aria-describedby',
                'usernameError inputValidationMsg validationMsg serverErrorMsg serverErrorMsgTransmit msgCont',
              );
              $('#password').attr('aria-describedby', 'passwordError');
              setTimeout(function () {
                $('#username').focus();
              }, 500);
            } else if (!$('#username').hasClass('error') && $('#password').hasClass('error')) {
              $('#username').attr(
                'aria-describedby',
                'usernameError validationMsg serverErrorMsg serverErrorMsgTransmit msgCont',
              );
              $('#password').attr('aria-describedby', 'passwordError inputValidationMsg');
              setTimeout(function () {
                $('#password').focus();
              }, 500);
            } else {
              $('#username').attr(
                'aria-describedby',
                'usernameError inputValidationMsg validationMsg serverErrorMsg serverErrorMsgTransmit msgCont',
              );
              $('#password').attr('aria-describedby', 'passwordError');
              setTimeout(function () {
                $('#username').focus();
              }, 500);
            }
            $('#msgCont').hide();
            return false;
          }
        }

        $.validator.addMethod('loginRegex', function (value, element) {
          return this.optional(element) || /^[a-zA-Z0-9]+$/i.test(value);
        });
        $.validator.addMethod('passwordRegex', function (value, element) {
          return this.optional(element) || /^[a-zA-Z0-9!@#$()_+\-\=<>?*~]*$/i.test(value);
        });
        $.validator.addMethod('passwordRegexSlash', function (value, element) {
          return this.optional(element) || !/^[\.][/\s+/]+$/i.test(value);
        });
        $.validator.addMethod('passwordRegexnoSpace', function (value, element) {
          return value.indexOf(' ') < 0 && value != '';
        });
        $.extend($.validator.messages, {
          maxlength:
            'על הסיסמה להכיל 6-14 תווים. חייבת להכיל ספרות ואותיות בלועזית (יש חשיבות לגודל האותיות) ויכולה להכיל את בתווים !@#$*()_-+=<>?~',
        });
        $('#loginForm').validate({
          onkeyup: function (element, event) {
            if (event.which === 9 && this.elementValue(element) === '') {
              return;
            } else {
              this.element(element);
            }
          },
          rules: {
            username: {
              required: false,
              loginRegex: true,
              // passwordRegexnoSpace: true,
            },
            password: {
              required: false,
              passwordRegex: true,
              passwordRegexSlash: true,
              passwordRegexnoSpace: false,
              maxlength: 14,
            },
          },

            $(element).attr('aria-invalid', 'true').addClass('error');
          },
          unhighlight: function (element) {
            $(element).removeAttr('aria-invalid').removeClass('error');
          },
          errorPlacement: function (error, element) {
            if (element.attr('name') == 'username') {
              error.insertAfter('#username').attr('id', 'usernameError');
            } else if (element.attr('name') == 'password') {
              error.insertAfter('#password').attr('id', 'passwordError');
            } else error.insertAfter(element);
          },
          messages: {
            username: {
              loginRegex: 'הקלד/י אותיות לועזיות וספרות בלבד',
              //  passwordRegexnoSpace:"הקלד/י אותיות לועזיות וספרות בלבד",
            },
            password: {
              passwordRegex:
                'על הסיסמה להכיל 6-14 תווים. חייבת להכיל ספרות ואותיות בלועזית (יש חשיבות לגודל האותיות) ויכולה להכיל את בתווים !@#$*()_-+=<>?~',
              passwordRegexSlash:
                'על הסיסמה להכיל 6-14 תווים. חייבת להכיל ספרות ואותיות בלועזית (יש חשיבות לגודל האותיות) ויכולה להכיל את בתווים !@#$*()_-+=<>?~',
              // passwordRegexnoSpace:"על הסיסמה להכיל 6-14 תווים. חייבת להכיל ספרות ואותיות בלועזית (יש חשיבות לגודל האותיות) ויכולה להכיל את בתווים !@#$*()_-+=<>?~",
            },
          },
        });

        //Transmit Login Section
        require.config({
          baseUrl: 'FibiOnlineTheme/themes/html/FibiOnlineTheme/',
          waitSeconds: 0,
          paths: {
            jquery: '/MatafLoginService/js/services/jquery-3.2.1.min',
            domReady: '/FibiOnlineTheme/themes/html/FibiOnlineTheme/xm/js/domReady',
            uiHandler: '/MatafLoginService/js/services/uiHandler',
            baseSession: '/MatafLoginService/js/services/baseSession',
          },
        });
        //$("input#username").on('paste keydown', function(e) {
        //	if (e.which === 32){
        //		return false;
        //	}
        //});
        var myusername = document.getElementById('username');
        cleanmyusername = function (e) {
          e.preventDefault();
          var pastedText = '';
          if (e.clipboardData && e.clipboardData.getData) {
            pastedText = e.clipboardData.getData('text/plain');
          } else if (window.clipboardData && window.clipboardData.getData) {
            pastedText = window.clipboardData.getData('Text');
          }
          this.value = pastedText.replace(/\s+/g, '');
        };
        myusername.onpaste = cleanmyusername;
        cleanmyusernameoninput = function (e) {
          e.preventDefault();
          this.value = myusername.value.replace(/\s+/g, '');
        };
        myusername.oninput = cleanmyusernameoninput;

        requirejs(
          [
            'domReady!',
            'jquery',
            '/MatafOTPServices/public/assets/js/xmsdk.js',
            '/MatafLoginService/js/services/uiHandler.js?ts=' + new Date().getTime(),
          ],
          function (doc, $, xm, MyUIHandler) {
            window.locked = false;
            window.loginError = false;
            window.loginAutType = 'UP';
            var oldLogin = false;
            var cssFile = 'page';
            var endpoint = 'https://online.fibi.co.il';
            var bankNum = '031';
            var bankIdForPiwik = '10';

            var appId = 'rest_app_' + bankNum;

            var client_ip = '10.12.18.194';
            var policyId = 'Login';
            var date = new Date().getTime();

            var cryptoMode = com.ts.mobile.sdk.ConnectionCryptoMode.Full;
            var connectionSettings = com.ts.mobile.sdk.SDKConnectionSettings.createWithCryptoMode(
              endpoint,
              appId,
              null,
              null,
              cryptoMode,
            );
            var sdk = xm.XmSdk();
            sdk.setConnectionSettings(connectionSettings);
            var policyParams = {};
            var container = $('#loginDiv');
            var clientContext = { uiContainer: container };

            var myHandler = new MyUIHandler(sdk.host);
            sdk.setUiHandler(myHandler);
            window.submitLoginForm = false;

            if (/Iphone|Android/i.test(navigator.userAgent)) {
              $('#username').addClass('mobile-username');
            } else {
              $('#username').focus();
            }

            //sdk.setLogLevel(com.ts.mobile.sdk.logLevel.Debug);
            sdk
              .initialize()
              .then(function () {
                //check if Im in exlporer 9 or less
                var ua = window.navigator.userAgent;
                var msie = ua.indexOf('MSIE');

                $('#loginForm input').keypress(function (e) {
                  if (e.which == 13) {
                    if (!window.submitLoginForm) {
                      disableLoginBtn();
                      initTransmit();
                    }
                    return false;
                  }
                });
                $('#continueBtn').click(function () {
                  document.getElementById('password').type = 'password';
                  if (!window.submitLoginForm) {
                    disableLoginBtn();
                    initTransmit();
                  }
                });
              })
              .catch(function (err) {
                var err_text = JSON.stringify(err);
                serverError($('#username').val(), err_text);
                enableLoginBtn();
                console.log('Initialize error: ' + err_text);
              });

            function authenticateTransmit() {
              window.authError = null;
              var username = $('#username').val();
              var transmitContainer = $('#loginDiv');
              var clientContext = { uiContainer: transmitContainer, userStage: 'login' };
              var additional_params = {
                bankId: bankNum,
                client_ip: client_ip,
              };
              if (checkInputValidations()) {
                // Using username.toLowerCase() in order to get over Transmit's bug, where the username is saved in the DB as is, and only afterwards is being changed to lower-case, so the lookup of the username's session in the DB fails. Changing it to lower-case does not have any effect because either way it is case-insensitive and being lower-cased later on by Transmit.
                sdk
                  .authenticate(username.toLowerCase(), policyId, additional_params, clientContext)
                  .then(
                    function (successfulAuth) {
                      ReportSuccessfulLoginToPiwik(username);
                      login(successfulAuth.getToken());
                    },
                    function (err) {
                      var err_text = JSON.stringify(err);
                      //User locked Error
                      if (
                        err._errorCode == 3 ||
                        (err._errorCode == 1 && err._data.assertion_error_code == 5) ||
                        (err._errorCode == 2 && err._data.assertion_error_code == 6)
                      ) {
                        if (clientContext.userStage && clientContext.userStage === 'login') {
                          handleLoginErrors();
                          return;
                        }
                        setOTPDiv();
                        createErrorMsg(strings['otp.errBlock']);
                      } else if (err._errorCode == 12 || err._errorCode == 11) {
                        setOTPDiv();
                        createErrorMsg(strings['validation.error']);
                      } else if (err._errorCode == 9) {
                        if (
                          err._data.failure_data.reason.data &&
                          err._data.failure_data.reason.data.retcode &&
                          '2' == err._data.failure_data.reason.data.retcode
                        ) {
                          setOTPDiv();
                          createErrorMsg(strings['otpNoPhonesError']);
                        } else {
                          // Not needed and not working -
                          //if (clientContext.userStage && clientContext.userStage === "login") {
                          //	handleLoginErrors();
                          //	return;
                          //}
                          setOTPDiv();
                          createErrorMsg(strings['validation.error']);
                        }
                      } else {
                        serverError(username, err_text);
                        enableLoginBtn();
                        setTimeout(function () {
                          $('#username').focus();
                        }, 500);
                      }
                      console.log('Authentication error: ' + err_text);
                    },
                  );
              } else {
                enableLoginBtn();
              }
            }

            function initTransmit() {
              hideLoginErrors();
              if (window.loginError) {
                sdk
                  .logout()
                  .then(function () {
                    authenticateTransmit();
                  })
                  .catch(function (err) {
                    var err_text = JSON.stringify(err);
                    console.log('Logout error: ' + err_text);
                    sessionStorage.removeItem('currentSession');
                    authenticateTransmit();
                  });
              } else {
                if (sessionStorage.getItem('currentSession') !== null) {
                  sdk
                    .logout()
                    .then(function () {
                      authenticateTransmit();
                    })
                    .catch(function (err) {
                      var err_text = JSON.stringify(err);
                      console.log('Logout error: ' + err_text);
                      sessionStorage.removeItem('currentSession');
                      authenticateTransmit();
                    });
                } else {
                  authenticateTransmit();
                }
              }
            }

            function createErrorMsg(errorMsg) {
              var optMsgPlaceHolder = $('#loginDiv');
              var errorMessageLockDiv = $(
                '<div class="container"><div class="animated fadeInDown fast" id="msgCont"><div class="col-xs-12 text-center" ><h2 id="wrongCode" class="big-error-text"></h2></div></div></div>',
              );
              var backButton = $(
                '<div class="animated fadeInDown fast"><div id="big_btn_container"><div class="col-xs-12"><div id="buttoncontainer"><button title=' +
                  strings['otp.back'] +
                  ' class="btn btn-primary form-control form-control-lg yellow-button"  id="cancel_btn_3">' +
                  strings['otp.back'] +
                  '</button></div></div></div></div>',
              );
              if (errorMsg != '') {
                errorMessageLockDiv.find('#wrongCode').text(errorMsg);
              }
              optMsgPlaceHolder.append(errorMessageLockDiv);
              errorMessageLockDiv.append(backButton);
              backButton.click(function () {
                window.parent.postMessage(
                  {
                    action: 'login',
                    message:
                      'https://online.fibi.co.il/MatafLoginService/MatafLoginServlet?bankId=FIBIPORTAL&site=Private&KODSAFA=HE',
                  },
                  'https://www.fibi.co.il',
                );
              });
            }

            function handleLoginErrors() {
              //Login MF Errors
              if (window.authError !== null) {
                window.loginError = true;
                console.log(authError._data);
                var user = $('#username').val();
                if (typeof window.authError._data.additional_data === 'undefined') {
                  cleanLoginForm();
                  showValidationError(window.loginServerError);
                  enableLoginBtn();
                } else {
                  //OnlineGW Server is down -> no connection error
                  if ($.isEmptyObject(authError._data.additional_data)) {
                    cleanLoginForm();
                    //	$("#serverErrorMsg").show();
                    $('.ErrorHolder').append(
                      '<div id="serverErrorMsg" style="color:  #FF5757;font-weight: 600;">' +
                        window.loginServerError +
                        '</div>',
                    );
                    enableLoginBtn();
                  }
                  //Failure Response
                  if (authError._data.additional_data.code == '1') {
                    //wrong credentials
                    if (authError._data.additional_data.message == '091') {
                      validationError(window.loginWorngDataMsg, user, authError);
                    } else if (authError._data.additional_data.message == '011') {
                      validationError(window.loginNotActiveError, user, authError);
                    } else if (authError._data.additional_data.message == '113') {
                      validationError(window.loginPassCanceldNotActive, user, authError);
                    } else if (authError._data.additional_data.message == 'Exception') {
                      cleanLoginForm();
                      showValidationError(window.loginServerError);
                      enableLoginBtn();
                    } else {
                      validationError(window.loginWorngDataMsg, user, authError);
                    }
                  }
                  //Block
                  else if (authError._data.additional_data.code == '2') {
                    window.loginError = false;
                    window.locked = authError._data.additional_data.locked;
                    //user password blocked -> Recover Password
                    if (authError._data.additional_data.message == '105') {
                      if (window.oldLogin == true) {
                        cleanLoginForm();
                        $('#blockErrorMsg').show();
                        top.ChangePass(window.recoverPassword);
                        enableLoginBtn();
                      } else {
                        $('.login-caption').hide();
                        $('#loginDiv').hide();
                        $('.forgot-block_noMargin').hide();
                        $('#passDialog').show();
                        enableLoginBtn();
                      }
                    } else if (authError._data.additional_data.message == '114') {
                      // validationError(window.loginBlockNotActiveError, user, authError);
                      validationError(window.loginBlockNotActiveErrorNew, user, authError);
                    }
                    //Other
                    else {
                      validationError(window.loginWorngDataMsg, user, authError);
                    }
                  }
                }
              } else {
                validationError(
                  window.loginWorngDataMsg + ' / ' + window.loginServerError,
                  user,
                  authError,
                );
              }
            }

            function validationError(errMsg, user, authError) {
              if (authError) {
              } else {
              }
              cleanLoginForm();
              showValidationError(errMsg);
              enableLoginBtn();
            }

            function showValidationError(errMsg) {
              if (window.oldLogin == true) {
                $('#validationMsg p').text(errMsg);
                $('#validationMsg').show();
              } else {
                $('.ErrorHolder').append(
                  '<div id="validationMsg" style="color:  #FF5757;font-weight: 600;"><span class="sr-only">' +
                    window.loginSRMsg +
                    '</span><span class="error">' +
                    errMsg +
                    '</span></div>',
                );
                setTimeout(function () {
                  $('#username').focus();
                }, 500);
              }
            }
          },
        );
        showHidePass();
      });
      function showHidePass() {
        var passInput = document.getElementById('password');
        $('#showpass').attr('title', showPassText);
        $('#showpass').on('click', function () {
          if (passInput.type === 'password') {
            passInput.type = 'text';
            $(passInput).addClass('lefttoright');
            $(this).addClass('showedPass');
            $('#showpass').attr('title', hidePassText);
            setTimeout(function () {
              $('#showpass').removeClass('showedPass');
              $('#showpass').attr('title', showPassText);
              passInput.type = 'password';
              $(passInput).removeClass('lefttoright');
            }, 2000);
          } else {
            passInput.type = 'password';
            $(this).removeClass('showedPass');
            $('#showpass').attr('title', hidePassText);
            $(passInput).removeClass('lefttoright');
          }
        });
      }
    </script>
