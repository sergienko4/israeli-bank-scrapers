      //Start Login Process
      $(document).ready(function () {
        isPlatinum();
        $('#userAndPassTab').click(function () {

          RecoverPassIframe();

        $('#errorDivBtn').click(function () {
          goToLoginUserAndPass();

        $('#moreInfoLink').click(function () {

        });

        $('.close').click(function () {
          $('#moreInfoPopup').hide();
        });

        function goToLoginUserAndPass() {
          window.parent.postMessage(
            {
              action: 'loginUserAndPass',
              message:
                'https://online.fibi.co.il/MatafLoginService/MatafLoginServlet?bankId=FIBIPORTAL&site=Private&KODSAFA=HE',
            },
            'https://www.fibi.co.il',
          );

        function RecoverPassIframe() {
          window.parent.postMessage(
            { message: 'https://online.fibi.co.il/MatafRecoverPassword/index.jsp' },
            'https://www.fibi.co.il',
          );
        }

        function srsuError(code, message, status) {
          cleanLoginForm();
          showSrsuErrorMsg(code);
          ReportFailureToPiwik(code);
        }

        function showSrsuErrorMsg(code) {
          if ('1113' == code) {
            $('#validationMsg').text('הסיסמה מבוטלת עקב אי שימוש. אנא פנה לסניף');
          } else if ('1011' == code) {
            $('#validationMsg').text('המנוי עדיין אינו פעיל');
          } else if ('1114' == code) {
            //$("#validationMsg").text("הסיסמה נחסמה עקב אי שימוש");
            $('#validationMsg').text('סיסמתך נחסמה, ניתן לחדשה ב "שכחתי סיסמה"');
          } else {
            $('#validationMsg').text('אחד או יותר מהנתונים שהוקלדו שגוי');
          }
          $('#validationMsg').show().attr('role', 'alert');
        }

        function ReportFailureToPiwik(code) {}

        function ReportErrorToPiwik(id, error) {}

        function ReportSuccessfulLoginToPiwik(id) {}

        function serverError(id, error) {
          ReportErrorToPiwik(id, error);
          showServerConnectionError();
        }

        function displayBlockDiv() {
          $('.login-caption').hide();
          $('#loginForm').hide();
          $('.forgot-block_noMargin').hide();
          $('#passDialog').show();
        }

        function setOTPDiv() {
          $('body').removeClass('white_bg');
          $('#loginDivDeskTop, #loginDivMobile').hide();
          $('#loginDivHolder').show();
          //$(".forgot-block_noMargin").hide();
          $('#title').text(strings['otpLoginTitle']);
        }

        function showStage_1() {
          window.moreThenOne = false;
          $('#title').text('כניסה לחשבונך');
          $('#imgTitleLogin').show();
          $('#loginUsingApp').show();
          $('#stage_2').hide();
          $('#stage_1').show();
        }

        function showStage_2() {
          window.moreThenOne = true;
          $('#title').text('בחירת חשבון');
          $('#imgTitleLogin').hide();
          $('#loginUsingApp').hide();
          $('#stage_1').hide();
          $('#stage_2').show();
        }

        function displayErrorDiv(mainText, subText) {
          cleanLoginForm();
          $('#backButton').hide();
          $('.login-caption').hide();
          $('#loginUsingApp').hide();
          $('#loginForm').hide();
          $('#errorDivMainText').text(mainText);
          $('#errorDivSubText').text(subText);
          $('#errorDiv').show();
          $('#moreInfoDiv').show();
        }

        function showServerConnectionError() {
          cleanLoginForm();
          $('#serverErrorMsgTransmit').show().attr('role', 'alert');
        }

        function cleanLoginForm() {
          $('#idNumber').val('');
          $('#cardNumber').val('');
          $('#branchNumber').val('');
          $('#accountNumber').val('');
          $('#msgCont').hide();
        }

        function enableLoginBtn() {
          window.submitLoginForm = false;
          $('#continueBtn').prop('disabled', false);
        }

        function disableLoginBtn() {
          window.submitLoginForm = true;
          $('#continueBtn').prop('disabled', 'disabled');
        }

        function hideLoginErrors() {
          if ($('#validationMsg:visible').length == 1) {
            $('#validationMsg').hide().removeAttr('role');
          }
          if ($('#serverErrorMsg:visible').length == 1) {
            $('#serverErrorMsg').hide().removeAttr('role');
          }
          if ($('#blockErrorMsg:visible').length == 1) {
            $('#blockErrorMsg').hide().removeAttr('role');
          }
          if ($('#serverErrorMsgTransmit:visible').length == 1) {
            $('#serverErrorMsgTransmit').hide().removeAttr('role');
          }
        }

        function login(token) {
          cleanLoginForm();
          $('#passwordEnc').val(token);
          if ($('#passwordEnc').val().length > 0) {
            $('#loginServlet').submit();
          } else {
            window.loginError = true;
            cleanLoginForm();
            $('#inputValidationMsg').show().attr('role', 'alert');
            enableLoginBtn();
          }
        }

        //Transmit Login Section
        require.config({
          baseUrl: 'FibiOnlineTheme/themes/html/FibiOnlineTheme/',
          waitSeconds: 0,
          paths: {
            jquery: '/MatafLoginService/js/services/jquery-3.2.1.min',
            domReady: '/FibiOnlineTheme/themes/html/FibiOnlineTheme/xm/js/domReady',
            uiHandler: '/MatafLoginService/js/services/uiHandler',
            baseSession: '/MatafLoginService/js/services/baseSession',
          },
        });

        requirejs(
          [
            'domReady!',
            'jquery',
            '/MatafOTPServices/public/assets/js/xmsdk.js',
            '/MatafLoginService/js/services/uiHandler.js?ts=' + new Date().getTime(),
          ],
          function (doc, $, xm, MyUIHandler) {
            window.locked = false;
            window.loginError = false;
            window.loginAutType = 'MA';

            var endpoint = 'https://online.fibi.co.il';
            var bankNum = '031';
            var bankIdForPiwik = '10';
            var appId = 'rest_app_' + bankNum;
            // TODO TEMP var policyId = "LoginMobApp";
            var policyId = 'LoginQRAno';
            var client_ip = '10.12.18.210';
            var date = new Date().getTime();

            var cryptoMode = com.ts.mobile.sdk.ConnectionCryptoMode.Full;
            // var cryptoMode = com.ts.mobile.sdk.ConnectionCryptoMode.None; // TODO TEMP
            var connectionSettings = com.ts.mobile.sdk.SDKConnectionSettings.createWithCryptoMode(
              endpoint,
              appId,
              null,
              null,
              cryptoMode,
            );
            var sdk = xm.XmSdk();
            //sdk.setLogLevel(com.ts.mobile.sdk.LogLevel.Debug); // TODO TEMP
            sdk.setConnectionSettings(connectionSettings);
            var policyParams = {};
            var container = $('#loginDiv');
            var clientContext = { uiContainer: container };

            var myHandler = new MyUIHandler(sdk.host);
            sdk.setUiHandler(myHandler);
            window.submitLoginForm = false;

            sdk
              .initialize()
              .then(function () {
                //check if I'm in explorer 9 or less
                var ua = window.navigator.userAgent;
                var msie = ua.indexOf('MSIE');

                if (!window.submitLoginForm) {
                  initTransmit();
                }
              })
              .catch(function (err) {
                var err_text = JSON.stringify(err);
                serverError($('#idNumber').val(), err_text);
                enableLoginBtn();
                console.log('Initialize error: ' + err_text);
              });

            function authenticateTransmit() {
              window.authError = null;
              var transmitContainer = $('#loginDiv');
              var clientContext = { uiContainer: transmitContainer };

              // Fix for U-Bank (UBank) Mobile Approve / QR Code:

              if (bankNum == '031' && isPlatinum) {
                bankNum = '026';
              }

              var additional_params = {
                bankId: bankNum,
                //	"id" : id,
                //	"cardNumber" : cardNumber,
                //	"client_ip" : client_ip
              };
              // if(window.moreThenOne){
              // 	var branch = $("#branchNumber").val();
              // 	var account = $("#accountNumber").val();
              // 	additional_params.branch = branch;
              // 	additional_params.account = account;
              // 	additional_params.shlav = 1;
              // }
              //if (checkInputValidations()) {
              sdk.invokeAnonymousPolicy(policyId, additional_params, clientContext).then(
                function (successfulAuth) {
                  //ReportSuccessfulLoginToPiwik(id);
                  login(successfulAuth.getToken());
                },
                // TODO handle errors
                function (err) {
                  var err_text = JSON.stringify(err);
                  var failureCode = err.getErrorCode();
                  var failureMessage = err.getMessage();
                  //Server Error
                  if ('6' == failureCode) {
                    // serverError($("#idNumber").val(),err_text);
                    enableLoginBtn();
                  }
                  //Error
                  else if ('9' == failureCode) {
                    //No Devices
                    if (typeof err._data.failure_data.reason.data === 'undefined') {
                      clearInterval(window.time);
                      clearTimeout(window.pollingTimer);
                      $('#loading').hide();
                      $('#errorImg').attr(
                        'src',
                        '/MatafLoginService/css/images/not-this-phone.png',
                      );
                      displayErrorDiv(
                        window.loginNoDevicesForUser,
                        window.loginNoDevicesForUserDetails,
                      );
                      //ReportFailureToPiwik(failureCode,failureMessage);
                    }
                    //SRSU Error
                    else {
                      if (typeof err._data.failure_data.reason.data.code === 'undefined') {
                        clearInterval(window.time);
                        clearTimeout(window.pollingTimer);
                        $('#loading').hide();
                        $('#errorImg').attr(
                          'src',
                          '/MatafLoginService/css/images/wrong-person.png',
                        );
                        displayErrorDiv(window.loginMobileApproveFail, '');
                        //ReportFailureToPiwik(failureCode,failureMessage);
                      } else if ('3' == err._data.failure_data.reason.data.code) {
                        $('#errorImg').attr(
                          'src',
                          '/MatafLoginService/css/images/big-white-lock.png',
                        );
                        displayErrorDiv(
                          window.loginMobileApproveTrysErrorTitle,
                          window.loginMobileApproveTrysErrorText,
                        );
                        //ReportFailureToPiwik(failureCode,failureMessage);
                      } else if ('2' == err._data.failure_data.reason.data.retcode) {
                        setOTPDiv();
                        createErrorMsg(strings['otpNoPhonesError']);
                      } else if ('1005' == err._data.failure_data.reason.data.code) {
                        showStage_2();
                      } else if ('1007' == err._data.failure_data.reason.data.code) {
                        cleanLoginForm();
                        //ReportFailureToPiwik(err._data.failure_data.reason.data.code);
                        // $("#passDialogTitle").text("הגישה לחשבונך נחסמה...");
                        displayBlockDiv();
                      } else if ('1113' == err._data.failure_data.reason.data.code) {
                        showStage_1();
                        srsuError(
                          err._data.failure_data.reason.data.code,
                          err._data.failure_data.reason.data.message,
                          err._data.failure_data.reason.data.status,
                        );
                      } else if ('1011' == err._data.failure_data.reason.data.code) {
                        showStage_1();
                        srsuError(
                          err._data.failure_data.reason.data.code,
                          err._data.failure_data.reason.data.message,
                          err._data.failure_data.reason.data.status,
                        );
                      } else if ('1114' == err._data.failure_data.reason.data.code) {
                        showStage_1();
                        srsuError(
                          err._data.failure_data.reason.data.code,
                          err._data.failure_data.reason.data.message,
                          err._data.failure_data.reason.data.status,
                        );
                      } else if ('1105' == err._data.failure_data.reason.data.code) {
                        cleanLoginForm();
                        //ReportFailureToPiwik(err._data.failure_data.reason.data.code);
                        displayBlockDiv();
                      } else {
                        showStage_1();
                        srsuError(
                          err._data.failure_data.reason.data.code,
                          err._data.failure_data.reason.data.message,
                          err._data.failure_data.reason.data.status,
                        );
                      }
                      enableLoginBtn();
                    }
                  }
                  //Mobile Approve auth locked
                  else if ('3' == failureCode || '2' == failureCode) {
                    $('#errorImg').attr('src', '/MatafLoginService/css/images/big-white-lock.png');
                    displayErrorDiv(
                      window.loginMobileApproveTrysErrorTitle,
                      window.loginMobileApproveTrysErrorText,
                    );
                    //ReportFailureToPiwik(failureCode,failureMessage);
                  }
                  //Mobile Approve authenticate failed or expired
                  else if ('19' == failureCode || '20' == failureCode) {
                    $('#errorImg').attr('src', '/MatafLoginService/css/images/wrong-person.png');
                    displayErrorDiv(window.loginMobileApproveFail, '');
                    //ReportFailureToPiwik(failureCode,failureMessage);
                  }
                  //OTP_Locked
                  else if (
                    ('1' == failureCode && err._data.assertion_error_code == 5) ||
                    ('2' == failureCode && err._data.assertion_error_code == 6)
                  ) {
                    setOTPDiv();
                    createErrorMsg(strings['otp.errBlock']);
                  }
                  //OTP_Error
                  else if ('12' == failureCode || '11' == failureCode) {
                    setOTPDiv();
                    createErrorMsg(strings['validation.error']);
                  } else {
                    $('#errorImg').attr('src', '/MatafLoginService/css/images/wrong-person.png');
                    displayErrorDiv(window.loginMobileApproveFail, '');
                    // ReportFailureToPiwik(failureCode,failureMessage);
                  }
                  console.log('Authentication Error Code: ' + failureCode);
                },
              );

              //} else { // (if(checkInputValidations()))
              //	enableLoginBtn();
              //}
            }

            function initTransmit() {
              hideLoginErrors();
              if (window.loginError) {
                sdk
                  .logout()
                  .then(function () {
                    authenticateTransmit();
                  })
                  .catch(function (err) {
                    var err_text = JSON.stringify(err);
                    console.log('Logout error: ' + err_text);
                    sessionStorage.removeItem('currentSession');
                    authenticateTransmit();
                  });
              } else {
                if (sessionStorage.getItem('currentSession') !== null) {
                  sdk
                    .logout()
                    .then(function () {
                      authenticateTransmit();
                    })
                    .catch(function (err) {
                      var err_text = JSON.stringify(err);
                      console.log('Logout error: ' + err_text);
                      sessionStorage.removeItem('currentSession');
                      authenticateTransmit();
                    });
                } else {
                  authenticateTransmit();
                }
              }
            }

            function createErrorMsg(errorMsg) {
              var optMsgPlaceHolder = $('#loginDiv');
              var errorMessageLockDiv = $(
                '<div class="container"><div class="animated fadeInDown fast" id="msgCont"><div class="col-xs-12 text-center" ><h2 id="wrongCode" class="big-error-text"></h2></div></div></div>',
              );
              var backButton = $(
                '<div class="animated fadeInDown fast"><div id="big_btn_container"><div class="col-xs-12"><div id="buttoncontainer"><button title=' +
                  strings['otp.back'] +
                  ' class="btn btn-primary form-control form-control-lg yellow-button"  id="cancel_btn_3">' +
                  strings['otp.back'] +
                  '</button></div></div></div></div>',
              );
              if (errorMsg != '') {
                errorMessageLockDiv.find('#wrongCode').text(errorMsg);
              }
              optMsgPlaceHolder.append(errorMessageLockDiv);
              errorMessageLockDiv.append(backButton);
              backButton.click(function () {
                window.parent.postMessage(
                  {
                    action: 'loginMA',
                    message:
                      'https://online.fibi.co.il/MatafLoginService/MatafMobileApproveServlet?bankId=FIBIPORTAL&site=Private&KODSAFA=HE',
                  },
                  'https://www.fibi.co.il',
                );
              });
            }
          },
        ); // requirejs(['domReady!', 'jquery' ,'/MatafOTPServices/public/assets/js/xmsdk.js','/MatafLoginService/js/services/uiHandler.js?ts='+(new Date()).getTime()],
