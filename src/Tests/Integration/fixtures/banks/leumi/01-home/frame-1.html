  <body>
    <div class="capital_market_widget">
      <div class="currency_rates_tab">
        <div class="latest_capital_rates tab_data" role="list">
          <div role="listitem">
            <div class="rightData">
              <span class="currencyImage icon_dollar"></span>
              <span class="currencyName" aria-label='דולר ארה"ב'>דולר ארה"ב</span>
            </div>
            <div class="leftData">
              <span class="shaar" id="dollar">2.918</span>

          </div>

          <div role="listitem">
            <div class="rightData">
              <span class="currencyImage icon_euro"></span>
              <span class="currencyName" aria-label="אירו">אירו</span>
            </div>
            <div class="leftData">
              <span class="shaar" id="euro">3.3814</span>
            </div>
          </div>

          <div role="listitem">
            <div class="rightData">
              <span class="currencyImage icon_sterling"></span>
              <span class="currencyName" aria-label="לירה שטרלינג">לירה שטרלינג</span>
            </div>
            <div class="leftData">
              <span class="shaar" id="sterling">3.9107</span>
            </div>
          </div>

          <div role="listitem">
            <div class="rightData">
              <span class="currencyImage icon_yen"></span>
              <span class="currencyName" aria-label="ין יפני 100">100 ין יפני</span>
            </div>
            <div class="leftData">
              <span class="shaar" id="yen">1.8203</span>
            </div>
          </div>
        </div>

        <div class="update_date_text" id="last-updated">עודכן לאחרונה ב־17 ביוני, 2026</div>
      </div>
    </div>
    <script>
      fetch('/Api/ForeignExchange/LatestCapitalRates')
        .then(response => response.json())
        .then(data => {
          const valueDollar = data.CapitalRates.dollar.rate;
          document.getElementById('dollar').textContent = valueDollar;
          const valueEuro = data.CapitalRates.euro.rate;
          document.getElementById('euro').textContent = valueEuro;
          const valueSterling = data.CapitalRates.sterling.rate;
          document.getElementById('sterling').textContent = valueSterling;
          const valueYen = data.CapitalRates.yen.rate;
          document.getElementById('yen').textContent = valueYen;
          const apiDateString = data.CapitalRates.yen.updateDate;

          function parseCustomDate(str) {
            const [day, month, yearShort] = str.split('/');

            const year = yearShort.length === 2 ? `20${yearShort}` : yearShort;

            return new Date(`${year}-${month}-${day}`);
          }

          function formatDateToHebrew(date) {
            const months = [
              'ינואר',
              'פברואר',
              'מרץ',
              'אפריל',
              'מאי',
              'יוני',
              'יולי',
              'אוגוסט',
              'ספטמבר',
              'אוקטובר',
              'נובמבר',
              'דצמבר',
            ];
            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            return `עודכן לאחרונה ב־${day} ב${month}, ${year}`;
          }

          const parsedDate = parseCustomDate(apiDateString);
          const formatted = formatDateToHebrew(parsedDate);
          document.getElementById('last-updated').textContent = formatted;
        })
        .catch(error => {
          console.error('error', error);
        });
    </script>
  </body>
