    <script>
      fetch('/Api/StockExchange/LatestCapitalTAIndices')
        .then(response => response.json())
        .then(data => {
          const value125 = data.Stock.TA.TA125.value;
          document.getElementById('TA125').textContent = value125;
          const value35 = data.Stock.TA.TA35.value;
          document.getElementById('TA35').textContent = value35;
          const valueBlueTec = data.Stock.TA.BlueTec.value;
          document.getElementById('BlueTec').textContent = valueBlueTec;
          const apiDateString = data.Stock.TA.BlueTec.updateDate;
          function parseCustomDateTime(str) {
            const [datePart, timePart] = str.split(' ');
            const [day, month, year] = datePart.split('/');

            const isoString = `${year}-${month}-${day}T${timePart}:00`;
            return new Date(isoString);
          }

          function formatDateTimeToHebrew(date) {
            const months = [
              'ינואר',
              'פברואר',
              'מרץ',
              'אפריל',
              'מאי',
              'יוני',
              'יולי',
              'אוגוסט',
              'ספטמבר',
              'אוקטובר',
              'נובמבר',
              'דצמבר',
            ];
            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();

            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const timeFormatted = `${hours}:${minutes}`;

            return `עודכן לאחרונה ב-${day} ב${month}, ${year} ${timeFormatted}`;
          }

          const parsedDate = parseCustomDateTime(apiDateString);
          const formatted = formatDateTimeToHebrew(parsedDate);
          document.getElementById('last-updated').textContent = formatted;
        })
        .catch(error => {
          console.error('error', error);
        });
    </script>
