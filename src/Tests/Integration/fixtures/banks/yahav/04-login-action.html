<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>כניסה | digital.yahav.co.il</title>
    <base href="https://digital.yahav.co.il/BaNCSDigitalUI/app/" />
  </head>
  <body>
    <main>
      <h1>כניסה לחשבון</h1>
      <form id="loginForm" novalidate>
        <label for="username">שם משתמש</label>
        <input id="username" name="username" type="text" autocomplete="username" />
        <label for="pinno">תעודת זהות</label>
        <input id="pinno" name="nationalID" type="text" inputmode="numeric" />
        <label for="password">סיסמה</label>
        <input id="password" name="password" type="password" autocomplete="current-password" />
        <button type="submit">כניסה</button>
      </form>
      <footer>yahav.co.il</footer>
    </main>
  </body>
</html>
