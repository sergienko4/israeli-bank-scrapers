Redaction rules (matches src/Tests/Unit/Pipeline/Infrastructure/
fixtures/hapoalim-dashboard/dashboard.html convention)
─────────────────────────────────────
- No real account ids / session GUIDs / tokens.
- The synthesized form is the simplest DOM that exhibits the
  Hapoalim OTP-screen behavior:
    • Both `#password` AND `#userCode` inputs persist on the
      OTP screen (Angular's component teardown is async; for
      ~5046 ms post-submit they remain in the DOM, dirty/touched).
    • A bare `<form>` ancestor (no id, no class, no name=).
    • Submit button discoverable via xpath
      `//button[@type="submit"]`.
- This snapshot is ALSO valid as a model of the LOGIN form
  itself (pre-submit state). The teardown race is captured by
  toggling element visibility in the JSDOM-based regression
  test — see LOG-POST-* unit tests.

How to refresh from a live capture
─────────────────────────────────────
1. Run on a CI runner (fresh IP) OR locally with VPN to defeat
   bank-side IP recognition.
2. Set DUMP_SNAPSHOTS=1 + CI=true.
3. Inject `await page.content()` capture at login.POST entry
   (see scripts/capture-hapoalim-login-otp-snapshot.local.ts —
   to be added in round-5).
4. Redact account ids, GUIDs, tokens. Replace with placeholders
   matching the dashboard fixture's convention
   (77-777-777777 / deadbeef-1337-…).
5. Replace this file. Re-run unit tests; selectors should
   match if Hapoalim hasn't redesigned the form.

<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Bank Hapoalim — Login (OTP transition state)</title>
  </head>
  <body>
    <!--
    Bare <form> ancestor — matches Hapoalim's actual DOM shape.
    `extractFormAnchorSelector` rejects this as untrustworthy
    (no id, no class, no [name="..."]), so the form-presence
    probe falls back to unscoped `#password` AND `#userCode`.
  -->
    <form>
      <label for="userCode">קוד משתמש</label>
      <input
        autocomplete="off"
        id="userCode"
        formcontrolname="userCode"
        inputmode="text"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
        class="form-control user-code-ctrl ng-valid mm-field-input ng-dirty ng-touched"
        type="text"
        aria-invalid="false"
      />

      <label for="password">סיסמה</label>
      <input
        autocomplete="off"
        id="password"
        formcontrolname="password"
        inputmode="text"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
        class="form-control password-control password-astrix ng-valid mm-field-input ng-dirty ng-touched"
        type="text"
        aria-invalid="false"
      />

      <button type="submit" class="red-coloring-btn login-btn" aria-disabled="false">כניסה</button>
    </form>
  </body>
</html>
