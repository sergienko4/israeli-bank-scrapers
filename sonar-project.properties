# SonarCloud Configuration
# Organization and project keys are injected via GitHub Actions secrets
# Do NOT hardcode sensitive identifiers here

sonar.sources=src
sonar.tests=src/Tests
sonar.test.inclusions=src/Tests/**/*.test.ts
sonar.exclusions=src/Tests/**,lib/**,node_modules/**,coverage/**,docs/**,tasks/**

sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info
