# SonarCloud Configuration
# Organization and project keys are injected via GitHub Actions secrets
# Do NOT hardcode sensitive identifiers here

sonar.sources=src
sonar.tests=src/Tests
sonar.test.inclusions=src/Tests/**/*.test.ts
# Legacy non-Pipeline scrapers + src/Common are excluded from SonarCloud
# analysis. Per project policy: migrated banks live under src/Scrapers/Pipeline/
# (which has its own 95% branch coverage threshold via jest.pipeline.config.cjs);
# unmigrated banks (Behatsdaa, BeyahadBishvilha, Leumi, Mizrahi, Yahav) ride
# the legacy src/Scrapers/<Bank>/ + src/Common/ + src/Scrapers/Registry/
# stack which is in maintenance-only mode (no new features, no enforced
# coverage). Excluding them here keeps the SonarCloud quality gate scoped
# to the Pipeline architecture which is the active surface.
sonar.exclusions=src/Tests/**,lib/**,node_modules/**,coverage/**,docs/**,tasks/**,**/EslintCanaries/**,src/Common/**,src/Scrapers/Behatsdaa/**,src/Scrapers/BeyahadBishvilha/**,src/Scrapers/Leumi/**,src/Scrapers/Mizrahi/**,src/Scrapers/Yahav/**,src/Scrapers/Registry/**

sonar.typescript.lcov.reportPaths=coverage/lcov.info,src/coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info,src/coverage/lcov.info

# Block PR merge if quality gate fails
sonar.qualitygate.wait=true

# ── Per-file rule exclusions ─────────────────────────────────────────
# S5542 (Use secure mode + padding) is suppressed for AesSymmetricSigner
# because the upstream bank server contract mandates AES-256-CBC +
# PKCS7. Switching to an AEAD mode (GCM/CCM) would break authentication
# with the bank. Replay protection is provided by the per-step random
# IV + the request `tsMs` window enforced server-side. The
# justification is documented in the JSDoc block above the
# `encryptBytes` helper.
sonar.issue.ignore.multicriteria=s5542aes
sonar.issue.ignore.multicriteria.s5542aes.ruleKey=typescript:S5542
sonar.issue.ignore.multicriteria.s5542aes.resourceKey=src/Scrapers/Pipeline/Mediator/ApiDirectCall/Crypto/AesSymmetricSigner.ts
