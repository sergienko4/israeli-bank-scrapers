# SonarCloud Configuration
# Organization and project keys are injected via GitHub Actions secrets
# Do NOT hardcode sensitive identifiers here

sonar.sources=src
sonar.tests=src/Tests
sonar.test.inclusions=src/Tests/**/*.test.ts
# Legacy non-Pipeline scrapers + src/Common are excluded from SonarCloud
# analysis. Per project policy: migrated banks live under src/Scrapers/Pipeline/
# (which has its own 95% branch coverage threshold via jest.pipeline.config.cjs);
# unmigrated banks (Behatsdaa, BeyahadBishvilha, Leumi, Mizrahi, Yahav) ride
# the legacy src/Scrapers/<Bank>/ + src/Common/ + src/Scrapers/Registry/
# stack which is in maintenance-only mode (no new features, no enforced
# coverage). Excluding them here keeps the SonarCloud quality gate scoped
# to the Pipeline architecture which is the active surface.
sonar.exclusions=src/Tests/**,lib/**,node_modules/**,coverage/**,docs/**,tasks/**,**/EslintCanaries/**,src/Common/**,src/Scrapers/Behatsdaa/**,src/Scrapers/BeyahadBishvilha/**,src/Scrapers/Leumi/**,src/Scrapers/Mizrahi/**,src/Scrapers/Yahav/**,src/Scrapers/Registry/**

# Per-bank hard-model scrape shapes are DELIBERATELY cloned across sibling
# banks under the zero-cross-bank-import convention: each bank's shape is
# self-contained (host + accounts + balance + transactions) so banks stay
# decoupled and independently evolvable rather than sharing a base that
# couples them (see the "cloned per the zero-cross-bank-import convention"
# docstrings in e.g. MassadShapeAccounts.ts / PagiShapeHelpers.ts). Sonar's
# copy-paste detector counts these intentional clones as new-code
# duplication. Exclude the scrape shapes from CPD ONLY — bugs, coverage,
# and code smells remain fully enforced on them.
sonar.cpd.exclusions=src/Scrapers/Pipeline/Banks/**/scrape/**

sonar.typescript.lcov.reportPaths=coverage/lcov.info,src/coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info,src/coverage/lcov.info

# Block PR merge if quality gate fails
sonar.qualitygate.wait=true

# Integration tests use `describe.each(BANK_FIXTURE_EXPECTATIONS)(...)` with
# a dynamic skip pattern (`(canDrive ? it : it.skip)(...)`) so Sonar's
# static parser cannot see a top-level `it()` call and falsely flags
# typescript:S2187 ("Add some tests to this file or delete it.").
# The tests DO run via Jest (verified by `npm run test:integration:mode-a`
# and `:mode-b` in CI), so silence the false positive on this scope only.
sonar.issue.ignore.multicriteria=integrationDynamicIt
sonar.issue.ignore.multicriteria.integrationDynamicIt.ruleKey=typescript:S2187
sonar.issue.ignore.multicriteria.integrationDynamicIt.resourceKey=src/Tests/Integration/**/*.test.ts
