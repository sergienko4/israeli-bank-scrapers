name: Install Camoufox Browser
description: Cache and install the Camoufox anti-detect browser with authenticated fallback

inputs:
  gh-token:
    description: GitHub token for authenticated release download fallback
    required: true

runs:
  using: composite
  steps:
    # Camoufox is pinned to the v135 stable line (matches the
    # Playwright 1.59.x bytes pinned in package.json — see the
    # fallback path recorded in commit 6305e576's body). Tried
    # v150.0.2-beta.25 alongside Playwright 1.60.0; v150's locale
    # handling regressed `navigator.language` (returned `en-US` even
    # when the context option declared `he-IL`, breaking
    # `AntiDetection.e2e-mocked.test.ts`). Reverted to dynamic-latest
    # fetch via camoufox-js (which resolves to v135.0.1-beta.24 with
    # the current `@hieutran094/camoufox-js: ^0.6.8` package), and
    # Playwright is held at ~1.59.1 in package.json so the cached
    # binary + client stay on the last green combination.
    - name: Cache Camoufox browser
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/camoufox
        key: camoufox-bin-v135-stable
    - name: Install Camoufox browser
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        if [ -f ~/.cache/camoufox/camoufox-bin ]; then
          echo "Camoufox already cached, skipping fetch"
        else
          echo "Cache miss — attempting camoufox-js fetch..."
          if npx @hieutran094/camoufox-js fetch; then
            echo "Camoufox installed via camoufox-js"
          else
            echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
            ASSET_DIR=$(mktemp -d)
            # Resolve latest daijro/camoufox release tag dynamically — no
            # static version pinned in CI; matches what camoufox-js itself
            # picks at fetch time.
            LATEST_TAG=$(gh release view --repo daijro/camoufox --json tagName -q .tagName)
            echo "Falling back to daijro/camoufox release: ${LATEST_TAG}"
            gh release download "${LATEST_TAG}" --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
            mkdir -p ~/.cache/camoufox
            unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
            rm -rf "$ASSET_DIR"
            chmod -R 755 ~/.cache/camoufox
            test -f ~/.cache/camoufox/camoufox-bin || (echo "ERROR: camoufox-bin not found after fallback" && exit 1)
            echo "Camoufox installed via authenticated gh fallback"
          fi
        fi
