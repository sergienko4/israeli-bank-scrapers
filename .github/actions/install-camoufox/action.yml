name: Install Camoufox Browser
description: Cache and install the Camoufox anti-detect browser with authenticated fallback

inputs:
  gh-token:
    description: GitHub token for authenticated release download fallback
    required: true
  bank:
    description: >-
      Bank identifier (e.g. `amex`, `max`). When set AND the workflow
      enables `USE_PERSISTENT_PROFILES=true` for the test step, the
      per-bank Camoufox profile directory is restored from / saved to
      the GH Actions cache so cookies + LocalStorage + IndexedDB carry
      across runs (improves Cloudflare scoring + bank-side device
      recognition). Empty input → no profile cache step runs and the
      legacy fresh-profile-per-launch flow is preserved.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: 'Install Xvfb (backs Camoufox virtual headless mode)'
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v Xvfb >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb
        fi
        # `Xvfb -version` does not exist (X.Org never adopted GNU
        # --version); report the installed package version via dpkg
        # so the CI log shows a clean line instead of the misleading
        # "Unrecognized option: -version" stderr from the binary.
        dpkg-query -W -f='${Package} ${Version}\n' xvfb || true
    - name: Cache Camoufox browser
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/camoufox
        key: camoufox-v135.0.1-beta.24
        restore-keys: |
          camoufox-
    - name: Cache per-bank persistent profile
      if: ${{ inputs.bank != '' }}
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/isbs/profiles/${{ inputs.bank }}
        key: profile-${{ inputs.bank }}-${{ runner.os }}-v1
        restore-keys: |
          profile-${{ inputs.bank }}-${{ runner.os }}-
    - name: Install Camoufox browser
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        if [ -f ~/.cache/camoufox/camoufox-bin ]; then
          echo "Camoufox already cached, skipping fetch"
        else
          echo "Cache miss — attempting camoufox-js fetch..."
          if npx @hieutran094/camoufox-js fetch; then
            echo "Camoufox installed via camoufox-js"
          else
            echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
            ASSET_DIR=$(mktemp -d)
            gh release download v135.0.1-beta.24 --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
            mkdir -p ~/.cache/camoufox
            unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
            rm -rf "$ASSET_DIR"
            chmod -R 755 ~/.cache/camoufox
            test -f ~/.cache/camoufox/camoufox-bin || (echo "ERROR: camoufox-bin not found after fallback" && exit 1)
            echo "Camoufox installed via authenticated gh fallback"
          fi
        fi
