name: Install Camoufox Browser
description: Cache and install the Camoufox anti-detect browser with authenticated fallback

inputs:
  gh-token:
    description: GitHub token for authenticated release download fallback
    required: true

runs:
  using: composite
  steps:
    # Camoufox is bumped to the v150 line (v150.0.2-beta.25) to trial the
    # Firefox 150 base, coupled with playwright-core 1.60.0 (Firefox
    # 150.0.2 juggler protocol) in package.json. The cache key below is a
    # fresh `-v150-test` value so the prior v135 cache cannot satisfy this
    # miss: on a miss the primary camoufox-js fetch resolves to the newest
    # in-range build (v150 today) and the gh-release fallback pins the SAME
    # v150 tag, so cache-hit / primary / fallback all converge on v150.
    # v150 regressed `navigator.language` (he-IL -> en-US); the
    # CamoufoxLauncher `intl.accept_languages` firefox_user_pref restores
    # he-IL so `AntiDetection.e2e-mocked.test.ts` stays green.
    - name: Cache Camoufox browser
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/camoufox
        # Fresh key — force a miss so the deterministic v150 binary is
        # cached (the prior v135 cache must NOT satisfy this miss).
        key: camoufox-bin-v150-test
    - name: Install Camoufox browser
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        if [ -f ~/.cache/camoufox/camoufox-bin ]; then
          echo "Camoufox already cached, skipping fetch"
        else
          echo "Cache miss — attempting camoufox-js fetch..."
          if npx @hieutran094/camoufox-js fetch; then
            echo "Camoufox installed via camoufox-js"
          else
            echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
            ASSET_DIR=$(mktemp -d)
            # Pin the fallback to the SAME v150 tag the primary
            # camoufox-js 0.6.8 fetchLatest resolves to (newest in-range).
            # The v150.0.2-beta.25 tag ships an alpha-named linux asset
            # (camoufox-150.0.2-alpha.26-lin.x86_64.zip) matched by the
            # glob below — keep primary + fallback on the same v150 base.
            PINNED_TAG=v150.0.2-beta.25
            echo "Falling back to daijro/camoufox release: ${PINNED_TAG}"
            gh release download "${PINNED_TAG}" --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
            mkdir -p ~/.cache/camoufox
            unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
            rm -rf "$ASSET_DIR"
            chmod -R 755 ~/.cache/camoufox
            test -f ~/.cache/camoufox/camoufox-bin || (echo "ERROR: camoufox-bin not found after fallback" && exit 1)
            echo "Camoufox installed via authenticated gh fallback"
          fi
        fi
