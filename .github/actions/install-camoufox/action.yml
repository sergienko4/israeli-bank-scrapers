name: Install Camoufox Browser
description: Cache and install the Camoufox anti-detect browser with authenticated fallback

inputs:
  gh-token:
    description: GitHub token for authenticated release download fallback
    required: true

runs:
  using: composite
  steps:
    # Camoufox is pinned to the v135 stable line (v135.0.1-beta.24),
    # matching @hieutran094/camoufox-js 0.6.8 and playwright-core
    # ~1.61.1 in package.json (Firefox 135 juggler protocol). playwright
    # 1.61 needs two compat shims for this Firefox: viewport:null (avoids
    # the unsupported Browser.setDefaultViewport) and the patch-package
    # guard on pageError.location (Camoufox omits it) — see
    # patches/playwright-core+1.61.1.patch. Both the primary camoufox-js
    # fetch AND the gh-release fallback below resolve to v135, so CI stays
    # deterministic on a cache miss or a rate-limited primary fetch. Do
    # NOT let the fallback track LATEST: v150.0.2's locale handling
    # regressed `navigator.language` (returned `en-US` even when the
    # context declared `he-IL`), breaking `AntiDetection.e2e-mocked.test.ts`.
    - name: Resolve pinned Camoufox tag
      id: camoufox-tag
      shell: bash
      # Single source of truth for the pinned tag (v135 stable line). The
      # cache key AND the gh-release fallback below both derive from this
      # output, so a tag bump invalidates the cache and re-pins the
      # fallback in one edit; never hardcode the version in two places.
      run: echo "tag=v135.0.1-beta.24" >> "$GITHUB_OUTPUT"
    - name: Cache Camoufox browser
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/camoufox
        # Cache the deterministic v135 binary, keyed by the exact pinned
        # tag so a cache hit can never restore a different build than the
        # fallback step downloads.
        key: camoufox-bin-${{ steps.camoufox-tag.outputs.tag }}
    - name: Install Camoufox browser
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        # Derived from the resolve-tag step so the fallback download and
        # the cache key above stay coupled to one pinned-tag literal.
        PINNED_TAG: ${{ steps.camoufox-tag.outputs.tag }}
      run: |
        set -euo pipefail
        if [ -f ~/.cache/camoufox/camoufox-bin ]; then
          echo "Camoufox already cached, skipping fetch"
        else
          echo "Cache miss — attempting camoufox-js fetch..."
          if npx @hieutran094/camoufox-js fetch; then
            echo "Camoufox installed via camoufox-js"
          else
            echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
            ASSET_DIR=$(mktemp -d)
            # PINNED_TAG comes from the step env (single source of truth,
            # see the resolve-tag step). It pins the fallback to the SAME
            # stable v135 tag camoufox-js 0.6.8 resolves to. LATEST is
            # currently v150.0.2-beta.25, whose locale regression
            # (navigator.language he-IL to en-US) breaks
            # AntiDetection.e2e-mocked.test.ts; never track it here.
            echo "Falling back to daijro/camoufox release: ${PINNED_TAG}"
            gh release download "${PINNED_TAG}" --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
            mkdir -p ~/.cache/camoufox
            unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
            rm -rf "$ASSET_DIR"
            chmod -R 755 ~/.cache/camoufox
            test -f ~/.cache/camoufox/camoufox-bin || (echo "ERROR: camoufox-bin not found after fallback" && exit 1)
            echo "Camoufox installed via authenticated gh fallback"
          fi
        fi
