version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - sergienko4
    labels:
      - dependencies
    groups:
      # Camoufox is a critical anti-detect dependency; every upstream
      # release (patch / minor / major) must flow through CI as its own
      # PR. Single source of truth for the version lives in
      # package.json — Dependabot keeps it current.
      camoufox:
        patterns:
          - '@hieutran094/camoufox-js'
        update-types:
          - patch
          - minor
          - major
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
        exclude-patterns:
          - '@hieutran094/camoufox-js'
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
        exclude-patterns:
          - '@hieutran094/camoufox-js'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies
    groups:
      actions:
        patterns:
          - '*'

  # CI mirror Dockerfile — Dependabot auto-bumps the @sha256: digest on
  # `FROM ubuntu:24.04@sha256:<digest>` whenever upstream re-tags 24.04.
  # Pairs with the RC-3 pin in `docker/Dockerfile.ci-mirror` so the
  # supply-chain integrity guarantee survives upstream image rebuilds.
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - ci
      - dependencies
