name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force npm publish without a new release (recover from release-please tag glitches)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || inputs.force_publish }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  validate:
    name: Full Validation
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Cache Camoufox browser
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            camoufox-
      - name: Install Camoufox browser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d ~/.cache/camoufox ] && ls ~/.cache/camoufox/*/camoufox 2>/dev/null; then
            echo "Camoufox already cached, skipping fetch"
          else
            echo "Cache miss — attempting camoufox-js fetch..."
            if npx @hieutran094/camoufox-js fetch; then
              echo "Camoufox installed via camoufox-js"
            else
              echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
              ASSET_DIR=$(mktemp -d)
              gh release download --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
              mkdir -p ~/.cache/camoufox
              unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
              rm -rf "$ASSET_DIR"
              ls ~/.cache/camoufox/*/camoufox || (echo "ERROR: Camoufox binary not found after fallback" && exit 1)
              echo "Camoufox installed via authenticated gh fallback"
            fi
          fi
      - name: Lint (warnings as errors)
        run: npx eslint src --max-warnings 0 --ignore-pattern '**/*.cjs'
      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests with coverage
        run: |
          npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
          node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --coverage --testPathIgnorePatterns='E2eReal/' --testPathIgnorePatterns='E2eMocked/'
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  publish:
    name: Publish to NPM
    needs: [release-please, validate]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Upgrade npm for Trusted Publishing (OIDC requires npm 11.5.1+)
        run: npm install -g npm@11.11.0 --ignore-scripts
      - run: npm ci
      - name: Build
        run: |
          npx tsup
          npx rimraf lib/Common lib/Scrapers lib/Tests
      - name: Publish with provenance (Trusted Publishing OIDC)
        run: npm publish --access public --provenance
