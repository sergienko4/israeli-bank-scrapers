name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  validate:
    name: Full Validation
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Lint (warnings as errors)
        run: npx eslint src --ext .ts --max-warnings 0
      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests with coverage
        run: |
          npx ncp src/tests/.tests-config.tpl.js src/tests/.tests-config.js
          npx jest --ci --coverage
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  publish:
    name: Publish to NPM
    needs: [release-please, validate]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Upgrade npm for Trusted Publishing (OIDC requires npm 11.5.1+)
        run: npm install -g npm@11
      - run: npm ci
      - name: Build
        run: |
          npx rimraf lib
          npx tsc --emitDeclarationOnly
          npx babel src --out-dir lib --extensions ".ts" --source-maps inline --verbose
          npx rimraf lib/tests
      - name: Publish with provenance (Trusted Publishing OIDC)
        run: npm publish --access public --provenance
