name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force npm publish without a new release (recover from release-please tag glitches)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ──────────────────────────────────────────────────────────────
# Job DAG:
#
#   release-please → publish (if release_created)
#
# No validate job — PR checks already passed before merge.
# Publish rebuilds from clean checkout (tsup ~6s, simpler than
# cross-workflow artifact sharing).
# ──────────────────────────────────────────────────────────────

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created || inputs.force_publish }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to NPM
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Upgrade npm for Trusted Publishing (OIDC requires npm 11.5.1+)
        run: |
          set -euo pipefail
          npm install -g npm@11.11.0 --ignore-scripts
          npm --version | grep -q '^11\.' || (echo "ERROR: npm upgrade failed" && exit 1)
      - run: npm ci
      - uses: ./.github/actions/build-package
      - name: Publish with provenance (Trusted Publishing OIDC)
        run: npm publish --access public --provenance
