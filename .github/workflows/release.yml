name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Full Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: browser-actions/setup-chrome@v2
      - run: npm ci
      - name: Lint (warnings as errors)
        run: npx eslint src --ext .ts --max-warnings 0
      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests with coverage
        run: |
          npx ncp src/tests/.tests-config.tpl.js src/tests/.tests-config.js
          npx jest --ci --coverage
      - name: Build
        run: |
          npx rimraf lib
          npx tsc --emitDeclarationOnly
          npx babel src --out-dir lib --extensions ".ts" --source-maps inline --verbose
          npx rimraf lib/tests
      - name: Verify build output
        run: |
          test -f lib/index.js || (echo "ERROR: lib/index.js missing" && exit 1)
          test -f lib/index.d.ts || (echo "ERROR: lib/index.d.ts missing" && exit 1)
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

  publish:
    name: Publish to NPM
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Upgrade npm for Trusted Publishing (OIDC requires npm 11.5.1+)
        run: npm install -g npm@latest
      - run: npm ci
      - name: Build
        run: |
          npx rimraf lib
          npx tsc --emitDeclarationOnly
          npx babel src --out-dir lib --extensions ".ts" --source-maps inline --verbose
          npx rimraf lib/tests
      - name: Publish with provenance (Trusted Publishing OIDC)
        run: npm publish --access public --provenance
