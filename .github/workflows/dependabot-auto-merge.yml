name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened]

permissions: {}

jobs:
  auto-merge:
    # Check `pull_request.user.login` instead of `github.actor` —
    # the actor context is spoofable via workflow re-runs by a
    # different user (zizmor `bot-conditions` audit, alert #41).
    # `pull_request.user.login` is the immutable PR author and
    # cannot be replayed by a third party.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Approve PR
        run: gh pr review "$PR_URL" --approve
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
