name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'jest.config.js'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Cache Camoufox browser
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
      - name: Install Camoufox browser
        run: npx @hieutran094/camoufox-js fetch
      - name: Run E2E smoke tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='tests/e2e\.test' --verbose

  e2e-mocked:
    name: E2E Mocked Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Cache Camoufox browser
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
      - name: Install Camoufox browser
        run: npx @hieutran094/camoufox-js fetch
      - name: Run mocked E2E tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='E2eMocked' --testPathIgnorePatterns='/node_modules/' --verbose

  e2e-real:
    name: E2E Real Bank Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Cache Camoufox browser
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
      - name: Install Camoufox browser
        run: npx @hieutran094/camoufox-js fetch
      - name: Run real E2E tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='Tests/E2eReal' --testPathIgnorePatterns='/node_modules/' --verbose
        env:
          AMEX_ID: ${{ secrets.AMEX_ID }}
          AMEX_CARD6DIGITS: ${{ secrets.AMEX_CARD6DIGITS }}
          AMEX_PASSWORD: ${{ secrets.AMEX_PASSWORD }}
          ISRACARD_ID: ${{ secrets.ISRACARD_ID }}
          ISRACARD_CARD6DIGITS: ${{ secrets.ISRACARD_CARD6DIGITS }}
          ISRACARD_PASSWORD: ${{ secrets.ISRACARD_PASSWORD }}
          VISACAL_USERNAME: ${{ secrets.VISACAL_USERNAME }}
          VISACAL_PASSWORD: ${{ secrets.VISACAL_PASSWORD }}
          MAX_USERNAME: ${{ secrets.MAX_USERNAME }}
          MAX_PASSWORD: ${{ secrets.MAX_PASSWORD }}
          DISCOUNT_ID: ${{ secrets.DISCOUNT_ID }}
          DISCOUNT_PASSWORD: ${{ secrets.DISCOUNT_PASSWORD }}
          DISCOUNT_NUM: ${{ secrets.DISCOUNT_NUM }}
          BEINLEUMI_USERNAME: ${{ secrets.BEINLEUMI_USERNAME }}
          BEINLEUMI_PASSWORD: ${{ secrets.BEINLEUMI_PASSWORD }}
