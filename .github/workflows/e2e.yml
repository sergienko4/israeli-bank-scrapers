name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'jest.config.js'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level for E2E real tests (info, debug, trace)'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - trace

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Cache Camoufox browser
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            camoufox-
      - name: Install Camoufox browser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f ~/.cache/camoufox/camoufox-bin ]; then
            echo "Camoufox already cached, skipping fetch"
          else
            echo "Cache miss — attempting camoufox-js fetch..."
            if npx @hieutran094/camoufox-js fetch; then
              echo "Camoufox installed via camoufox-js"
            else
              echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
              ASSET_DIR=$(mktemp -d)
              gh release download --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
              mkdir -p ~/.cache/camoufox
              unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
              rm -rf "$ASSET_DIR"
              chmod -R 755 ~/.cache/camoufox
              test -f ~/.cache/camoufox/camoufox-bin || (echo "ERROR: camoufox-bin not found after fallback" && exit 1)
              echo "Camoufox installed via authenticated gh fallback"
            fi
          fi
      - name: Run E2E smoke tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --forceExit --testPathPatterns='tests/e2e\.test' --verbose

  e2e-mocked:
    name: E2E Mocked Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Cache Camoufox browser
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            camoufox-
      - name: Install Camoufox browser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f ~/.cache/camoufox/camoufox-bin ]; then
            echo "Camoufox already cached, skipping fetch"
          else
            echo "Cache miss — attempting camoufox-js fetch..."
            if npx @hieutran094/camoufox-js fetch; then
              echo "Camoufox installed via camoufox-js"
            else
              echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
              ASSET_DIR=$(mktemp -d)
              gh release download --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
              mkdir -p ~/.cache/camoufox
              unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
              rm -rf "$ASSET_DIR"
              chmod -R 755 ~/.cache/camoufox
              test -f ~/.cache/camoufox/camoufox-bin || (echo "ERROR: camoufox-bin not found after fallback" && exit 1)
              echo "Camoufox installed via authenticated gh fallback"
            fi
          fi
      - name: Run mocked E2E tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --forceExit --testPathPatterns='E2eMocked' --testPathIgnorePatterns='/node_modules/' --verbose

  e2e-real:
    name: E2E Real Bank Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Cache Camoufox browser
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            camoufox-
      - name: Install Camoufox browser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f ~/.cache/camoufox/camoufox-bin ]; then
            echo "Camoufox already cached, skipping fetch"
          else
            echo "Cache miss — attempting camoufox-js fetch..."
            if npx @hieutran094/camoufox-js fetch; then
              echo "Camoufox installed via camoufox-js"
            else
              echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
              ASSET_DIR=$(mktemp -d)
              gh release download --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
              mkdir -p ~/.cache/camoufox
              unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
              rm -rf "$ASSET_DIR"
              chmod -R 755 ~/.cache/camoufox
              test -f ~/.cache/camoufox/camoufox-bin || (echo "ERROR: camoufox-bin not found after fallback" && exit 1)
              echo "Camoufox installed via authenticated gh fallback"
            fi
          fi
      - name: Run real E2E tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --forceExit --testPathPatterns='Tests/E2eReal' --testPathIgnorePatterns='/node_modules/' --verbose
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          AMEX_ID: ${{ secrets.AMEX_ID }}
          AMEX_CARD6DIGITS: ${{ secrets.AMEX_CARD6DIGITS }}
          AMEX_PASSWORD: ${{ secrets.AMEX_PASSWORD }}
          ISRACARD_ID: ${{ secrets.ISRACARD_ID }}
          ISRACARD_CARD6DIGITS: ${{ secrets.ISRACARD_CARD6DIGITS }}
          ISRACARD_PASSWORD: ${{ secrets.ISRACARD_PASSWORD }}
          VISACAL_USERNAME: ${{ secrets.VISACAL_USERNAME }}
          VISACAL_PASSWORD: ${{ secrets.VISACAL_PASSWORD }}
          MAX_USERNAME: ${{ secrets.MAX_USERNAME }}
          MAX_PASSWORD: ${{ secrets.MAX_PASSWORD }}
          DISCOUNT_ID: ${{ secrets.DISCOUNT_ID }}
          DISCOUNT_PASSWORD: ${{ secrets.DISCOUNT_PASSWORD }}
          DISCOUNT_NUM: ${{ secrets.DISCOUNT_NUM }}
          BEINLEUMI_USERNAME: ${{ secrets.BEINLEUMI_USERNAME }}
          BEINLEUMI_PASSWORD: ${{ secrets.BEINLEUMI_PASSWORD }}
