          [ -d "$root" ] || { echo "no run dir -- nothing to upload."; exit 0; }
          find "$root" -type f -print0 | while IFS= read -r -d '' f; do
            obj="${DIAG_BANK}/${RUN_TAG}/${f#"$root"/}"
            if curl -sS --fail-with-body --retry 3 --retry-delay 2 -T "$f" "${OCI_DIAG_PAR_URL}${obj}"; then
              echo "uploaded ${obj}"
            else
              echo "WARN: upload failed for ${obj}"
            fi
          done
          echo "private diagnostics upload complete."
      # ── Cooldown hold (post-run slot retention) ──
      # Holds the job's repo-wide concurrency.group slot
      # (e2e-real-bank-<bank>-<repo>) for 600 s so the NEXT same-bank
      # run — across ANY PR or workflow — starts at least 10 min after
      # this run completed. WAF risk-score decay window observed: 15-60
      # min for Hapoalim image-puzzle escalation; 10 min is the minimum
      # that meaningfully reduces repeat-trigger probability without
      # over-burning runner time. Always runs (success OR failure) so
      # repeated failures (which often indicate WAF heat) also throttle.
      # Replaces the actions/cache-backed timestamp dance per CR review
      # on PR #300 (cache was PR-branch scoped → cross-PR enforcement
      # unreliable; concurrency.group + post-run sleep is reliable).
      - name: Cooldown hold (${{ matrix.bank }})
        if: always()
        run: |
          echo "[cooldown-hold] sleeping 600 s to hold concurrency slot for ${{ matrix.bank }}"
          sleep 600
          echo "[cooldown-hold] done; slot freed for next queued same-bank job"

  # ──────────────────────────────────────────────────────────────
  # Group C — api-direct banks (OneZero, Pepper, PayBox). No
  # browser; HTTP-only flows. Requires gate-C approval AFTER
  # Group B has completed. Telegram OTP secrets exposed for the
  # SMS OTP dance on cold-start runs (warm runs use long-term JWTs).
  # ──────────────────────────────────────────────────────────────
  e2e-real-group-c-gate:
    name: E2E Real C — approval gate
    # Independent of Groups A + B — see the gate-B comment for the
    # rationale (per-group approval, no inter-group ordering).
    needs: [validate, dns-preflight]
    # See dns-preflight comment for `real_gates_enabled` semantics.
    if: needs.validate.outputs.real_gates_enabled == 'true'
    runs-on: ubuntu-latest
    # Distinct environment per the gate-A comment above — each
    # group's approval click is independent.
    environment: e2e-real-group-c
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Gate released
        run: echo "Group C approved; api-direct matrix may proceed."

  e2e-real-group-c:
    name: E2E Real C (${{ matrix.bank }})
    needs: e2e-real-group-c-gate
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Serialize same-bank runs repo-wide. Cooldown step below adds a
    # 10-min minimum gap. Encrypted JWT-cache restore-then-decrypt
    # warms the OTP long-term token (~95 % of runs skip the full SMS
    # flow). Save step encrypts the fresh post-scrape token.
    concurrency:
      group: e2e-real-bank-${{ matrix.bank }}-${{ github.repository }}
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        bank:
          - OneZero
          - Pepper
          - PayBox
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Force reliable DNS for ${{ matrix.bank }}
        run: bash .github/scripts/ci/dns-warmup.sh ${{ matrix.bank }}
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      # ── Warm-token cache: encrypted long-term OTP JWT persistence.
      # On the FIRST run for a branch (or after TOKEN_CACHE_KEY
      # rotation), no cache exists → cold-start (full OTP flow). The
      # fresh token is then encrypted + saved post-scrape; subsequent
      # runs restore + decrypt + skip the SMS-OTP dance.
      # NOTE: cache is branch-scoped. Branches inherit main's last
      # cache via the default-branch fallback rule, so a brand-new PR
      # gets a warm start as long as main has run recently.
      - name: Restore encrypted token cache (${{ matrix.bank }})
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        with:
          path: /tmp/tokens-encrypted
          key: tokens-${{ matrix.bank }}-${{ github.run_id }}-${{ github.run_attempt }}-restore
          restore-keys: |
            tokens-${{ matrix.bank }}-
      - name: Decrypt token cache (${{ matrix.bank }})
        env:
          CACHE_KEY: ${{ secrets.TOKEN_CACHE_KEY }}
        run: bash .github/scripts/ci/decrypt-token-cache.sh "${{ matrix.bank }}"
      - name: E2E real (${{ matrix.bank }})
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'trace' }}
          RUNS_ROOT: /tmp/runs
          # api-direct banks. PayBox derives deviceId16Hex from
          # PAYBOX_PHONE_NUMBER via the sha256-prefix-16 bootstrap
          # (see PayBoxCreds.ts JSDoc) — no PAYBOX_DEVICE_ID16HEX
          # secret needed. The *_OTP_LONG_TERM env vars are
          # PRESENCE-FLAGS (any nonempty value enables warm-cache
          # mode in src/Tests/E2eReal/TokenCache.ts); the actual JWT
          # comes from the decrypted /tmp/<bank>-token.cache file.
          ONEZERO_EMAIL: ${{ secrets.ONEZERO_EMAIL }}
          ONEZERO_PASSWORD: ${{ secrets.ONEZERO_PASSWORD }}
          ONEZERO_PHONE_NUMBER: ${{ secrets.ONEZERO_PHONE_NUMBER }}
          ONEZERO_OTP_LONG_TERM: ${{ secrets.ONEZERO_OTP_LONG_TERM }}
          PEPPER_PHONE_NUMBER: ${{ secrets.PEPPER_PHONE_NUMBER }}
          PEPPER_PASSWORD: ${{ secrets.PEPPER_PASSWORD }}
          PEPPER_OTP_LONG_TERM: ${{ secrets.PEPPER_OTP_LONG_TERM }}
          PAYBOX_PHONE_NUMBER: ${{ secrets.PAYBOX_PHONE_NUMBER }}
          # PAYBOX_OTP_LONG_TERM presence-flag enables the warm-cache
          # path for PayBox. Defaults to "1" so the cache is enabled
          # even when the optional secret is not configured by the
          # repo owner — the actual JWT still comes from the
          # decrypted /tmp file (cold path runs the full OTP flow
          # the first time, then warm-caches the token).
          PAYBOX_OTP_LONG_TERM: ${{ secrets.PAYBOX_OTP_LONG_TERM || '1' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --ci \
            --testPathPatterns="E2eReal/${{ matrix.bank }}\\.e2e-real" \
            --testNamePattern='scrapes transactions successfully' \
            --testPathIgnorePatterns='/node_modules/' \
            --verbose \
            --forceExit
      - name: Upload diagnostics on failure (${{ matrix.bank }})
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-real-${{ matrix.bank }}-diag-${{ github.run_id }}
          path: |
            /tmp/runs/pipeline/**/pipeline.log
            /tmp/runs/pipeline/**/network/*.json
            /tmp/runs/pipeline/**/screenshots/*.png
          retention-days: 7
          if-no-files-found: warn
      - name: Upload full diagnostics to private store (${{ matrix.bank }})
        if: failure()
        env:
          OCI_DIAG_PAR_URL: ${{ secrets.OCI_DIAG_PAR_URL }}
          DIAG_BANK: ${{ matrix.bank }}
          RUN_TAG: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          # Best-effort upload of the FULL run dir -- including post-auth
          # screenshots diverted to private/ by SafeScreenshot.ts -- to the
          # access-controlled OCI bucket via a write-only pre-authenticated
          # request (AnyObjectWrite = create/overwrite only; no read, list,
          # or delete; bucket NoPublicAccess; 3-day TTL). Never touches the
          # public artifact above. Skips cleanly when the secret is absent
          # (forks / external PRs) so it can never fail the job.
          if [ -z "${OCI_DIAG_PAR_URL:-}" ]; then
            echo "OCI_DIAG_PAR_URL not configured -- skipping private upload."
            exit 0
          fi
          root=/tmp/runs/pipeline
          [ -d "$root" ] || { echo "no run dir -- nothing to upload."; exit 0; }
          find "$root" -type f -print0 | while IFS= read -r -d '' f; do
            obj="${DIAG_BANK}/${RUN_TAG}/${f#"$root"/}"
            if curl -sS --fail-with-body --retry 3 --retry-delay 2 -T "$f" "${OCI_DIAG_PAR_URL}${obj}"; then
              echo "uploaded ${obj}"
            else
              echo "WARN: upload failed for ${obj}"
            fi
          done
          echo "private diagnostics upload complete."
      - name: Encrypt token cache for save (${{ matrix.bank }})
        if: always()
        env:
          CACHE_KEY: ${{ secrets.TOKEN_CACHE_KEY }}
        run: bash .github/scripts/ci/encrypt-token-cache.sh "${{ matrix.bank }}"
      - name: Save encrypted token cache (${{ matrix.bank }})
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        with:
          path: /tmp/tokens-encrypted
          key: tokens-${{ matrix.bank }}-${{ github.run_id }}-${{ github.run_attempt }}
      # ── Cooldown hold (post-run slot retention) ──
      # Holds the job's repo-wide concurrency.group slot
      # (e2e-real-bank-<bank>-<repo>) for 600 s so the NEXT same-bank
      # run — across ANY PR or workflow — starts at least 10 min after
      # this run completed. WAF risk-score decay window observed: 15-60
      # min for Hapoalim image-puzzle escalation; 10 min is the minimum
      # that meaningfully reduces repeat-trigger probability without
      # over-burning runner time. Always runs (success OR failure) so
      # repeated failures (which often indicate WAF heat) also throttle.
      # Replaces the actions/cache-backed timestamp dance per CR review
      # on PR #300 (cache was PR-branch scoped → cross-PR enforcement
      # unreliable; concurrency.group + post-run sleep is reliable).
      - name: Cooldown hold (${{ matrix.bank }})
        if: always()
        run: |
          echo "[cooldown-hold] sleeping 600 s to hold concurrency slot for ${{ matrix.bank }}"
          sleep 600
          echo "[cooldown-hold] done; slot freed for next queued same-bank job"

  dependency-review:
    name: Dependency Review
    needs: validate
    if: >-
      github.event_name == 'pull_request' &&
      needs.validate.outputs.src_touched == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      # v5.0.0 — first stable release on Node.js 24 (published
      # 2026-05-08). The SHA a1d282b3... resolves to tag v5.0.0
      # (verified via /repos/actions/dependency-review-action/git/refs).
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          # SPDX identifiers ONLY — `BSD License` (generic, no version)
          # and similar non-SPDX classifier strings are intentionally
          # excluded so an unknown license triggers a hard failure via
          # the allow-licenses gate (production-code policy: every
          # dependency must declare a machine-readable license).
          allow-licenses: >-
            MIT, ISC, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD,
            BlueOak-1.0.0, CC0-1.0, CC-BY-3.0, CC-BY-4.0, MPL-2.0,
            Python-2.0, WTFPL, Unlicense
          # Per-package overrides for dependencies whose license IS
          # machine-verifiable upstream (LICENSE file / repo metadata)
          # but where dependency-review-action's PyPI/npm scanner
          # cannot map the metadata to an SPDX identifier. Each entry
          # below documents the upstream license verified by reading
          # the project's LICENSE file directly.
          allow-dependencies-licenses: >-
            pkg:npm/playwright-core,
            pkg:githubactions/SonarSource/sonarqube-scan-action,
            pkg:pypi/gitdb,
            pkg:pypi/Pygments,
            pkg:pypi/GitPython,
            pkg:pypi/Jinja2,
            pkg:pypi/Markdown,
            pkg:pypi/mkdocs-get-deps,
            pkg:pypi/pymdown-extensions,
            pkg:pypi/ghp-import
          # Upstream license verification (audited 2026-05-28 via
          # PyPI JSON API + each project's LICENSE file):
          #   gitdb              → BSD-3-Clause  (joint w/ embedded
          #                        Apache fragment + GPL-1.0-or-later
          #                        for a single setup-helper file
          #                        that ships unchanged from upstream;
          #                        explicit allowlist required)
          #   Pygments           → BSD-2-Clause  (PEP 639 only)
          #   GitPython          → BSD-3-Clause  (license field)
          #   Jinja2             → BSD-3-Clause  (Pallets LICENSE.txt)
          #   Markdown           → BSD-3-Clause  (PEP 639 only)
          #   mkdocs-get-deps    → MIT
          #   pymdown-extensions → MIT
          #   ghp-import         → Apache-2.0    (repo LICENSE)

      # OpenSSF Scorecard hard-fail gate. dependency-review-action only
      # WARNS on Scorecard regressions (its only knob is
      # warn-on-openssf-scorecard-level); we want hard failures so a
      # new low-scoring dep blocks the PR. This step queries the
      # Scorecard API for every package in requirements-docs.txt,
      # compares each score to the threshold, and fails the build on
      # any violation that isn't on the documented exception list.
      #
      # Why the exception list exists at all: some packages are
      # mandatory transitives of `mkdocs` / `mkdocs-material` with no
      # maintained alternative. Each entry MUST document why no
      # replacement is available + the date it was last reviewed.
      # New additions require explicit reviewer signoff. The current
      # accepted exceptions (see scripts/scorecard-hardfail.sh) are:
      #   - ghp-import                    (mkdocs gh-deploy publisher)
      #   - mkdocs-material-extensions    (mkdocs-material 9.x transitive
      #                                    providing emoji generators
      #                                    pymdownx.emoji references)
      - name: OpenSSF Scorecard hard-fail gate
        run: bash .github/workflows/scripts/scorecard-hardfail.sh
        env:
          SCORECARD_THRESHOLD: '3.0'
          REQUIREMENTS_FILE: 'requirements-docs.txt'
