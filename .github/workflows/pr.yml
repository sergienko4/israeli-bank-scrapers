      - name: Upload full diagnostics to private store (${{ matrix.bank }})
        if: failure()
        env:
          OCI_DIAG_PAR_URL: ${{ secrets.OCI_DIAG_PAR_URL }}
          DIAG_BANK: ${{ matrix.bank }}
          RUN_TAG: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          # Best-effort upload of the FULL run dir -- including post-auth
          # screenshots diverted to private/ by SafeScreenshot.ts -- to the
          # access-controlled OCI bucket via a write-only pre-authenticated
