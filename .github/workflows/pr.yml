name: PR Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'tsup.config.ts'
      - 'jest.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc.cjs'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'tsup.config.ts'
      - 'jest.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc.cjs'
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level for E2E real tests (info, debug, trace)'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - trace

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# Architecture: 2 parallel jobs
#
#   validate    — single job: npm ci once → lint → tsc → audit →
#                 unit tests → e2e smoke (invalid creds) → e2e mocked →
#                 e2e full (real creds) → build → upload artifacts
#   dep-review  — no packages needed, PR-only
# ──────────────────────────────────────────────────────────────

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs

      # ── Lint & Format ──
      - name: ESLint (warnings as errors)
        run: npx eslint src --max-warnings 0 --ignore-pattern '**/*.cjs'
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          globs: '*.md docs/**/*.md tasks/**/*.md'
          config: '.markdownlint.json'

      # ── Type Check ──
      - name: Type check
        run: npx tsc --noEmit

      # ── Audit ──
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Unit Tests ──
      - name: Unit tests with coverage
        run: npm run test:pipeline

      # ── E2E Factory Tests ──
      - name: E2E factory tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='Tests/E2e\.test' --verbose --forceExit

      # ── E2E Smoke Tests (invalid credentials — always runs, no secrets needed) ──
      - name: E2E smoke tests (invalid credentials)
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='E2eSmoke' --testPathIgnorePatterns='/node_modules/' --verbose --forceExit

      # ── E2E Mocked Tests ──
      - name: E2E mocked tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='E2eMocked' --testPathIgnorePatterns='/node_modules/' --verbose --forceExit

      # ── E2E Full Bank Tests (real credentials — same-repo PRs and manual dispatch only) ──
      - name: E2E full bank tests (real credentials)
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='E2eFull' --testPathIgnorePatterns='/node_modules/' --verbose --forceExit
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          AMEX_ID: ${{ secrets.AMEX_ID }}
          AMEX_CARD6DIGITS: ${{ secrets.AMEX_CARD6DIGITS }}
          AMEX_PASSWORD: ${{ secrets.AMEX_PASSWORD }}
          ISRACARD_ID: ${{ secrets.ISRACARD_ID }}
          ISRACARD_CARD6DIGITS: ${{ secrets.ISRACARD_CARD6DIGITS }}
          ISRACARD_PASSWORD: ${{ secrets.ISRACARD_PASSWORD }}
          VISACAL_USERNAME: ${{ secrets.VISACAL_USERNAME }}
          VISACAL_PASSWORD: ${{ secrets.VISACAL_PASSWORD }}
          MAX_USERNAME: ${{ secrets.MAX_USERNAME }}
          MAX_PASSWORD: ${{ secrets.MAX_PASSWORD }}
          DISCOUNT_ID: ${{ secrets.DISCOUNT_ID }}
          DISCOUNT_PASSWORD: ${{ secrets.DISCOUNT_PASSWORD }}
          DISCOUNT_NUM: ${{ secrets.DISCOUNT_NUM }}
          BEINLEUMI_USERNAME: ${{ secrets.BEINLEUMI_USERNAME }}
          BEINLEUMI_PASSWORD: ${{ secrets.BEINLEUMI_PASSWORD }}

      # ── Build ──
      - uses: ./.github/actions/build-package
      - name: Dry-run publish (catch packaging errors early)
        run: npm pack --dry-run

      # ── Upload Artifacts ──
      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-output
          path: lib/
          retention-days: 7
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: src/coverage/
          retention-days: 7

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          allow-licenses: >-
            MIT, ISC, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD,
            BlueOak-1.0.0, CC0-1.0, CC-BY-3.0, CC-BY-4.0, MPL-2.0,
            Python-2.0, WTFPL, Unlicense
          allow-dependencies-licenses: >-
            pkg:npm/playwright-core,
            pkg:githubactions/SonarSource/sonarqube-scan-action
