name: PR Validation

on:
  # No `paths:` filter anymore. Branch protection + ruleset require the
  # `Validate` status context on every PR; with a path filter the
  # context never fires on non-src PRs and we used to satisfy the gate
  # via a `pr-docs.yml` echo-shim. Folded in 2026-05-28 CI consolidation
  # (PR #275): the validate job now always runs, and `detect-changes`
  # below short-circuits the heavy steps when no src/** is touched.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level for E2E real tests (info, debug, trace)'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - trace

concurrency:
  group: pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Top-level (file-scope) least-privilege baseline — closes CodeQL alert
# #33 (TokenPermissionsID). Per the GitHub StepSecurity hardening
# pattern, every workflow MUST declare permissions at the file scope so
# the default `GITHUB_TOKEN` carries the minimum needed for the cheapest
# job. Jobs that need elevated permissions override locally and ONLY for
# the keys they need (see release.yml release-please job).
permissions:
  contents: read

# Strict shell mode for every `run:` step.
#   -e          — exit on first non-zero command
#   -u          — error on unset variables (catches missing-env-var typos)
#   -o pipefail — propagate failures through pipelines (e.g. `cmd | tee`)
# Without `pipefail`, `node ... | tee` would mask a Jest failure behind
# tee's 0 exit. Adding this once at workflow scope avoids forgetting
# `set -euo pipefail` at the top of every multi-line `run: |` block.
defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

# ──────────────────────────────────────────────────────────────
# Job DAG (cheap-gates-first, fail-fast):
#
#   validate              — lint → tsc → audit → unit tests →
#                           e2e factory + e2e mocked → build →
#                           upload artifacts.
#                           MOCKED tests live here so failures are
#                           caught BEFORE we burn real-bank capacity.
#   e2e-smoke             — 17-bank matrix (invalid-creds, parallel).
#   dns-preflight         — Israeli bank DNS resolution sanity.
#   e2e-real-group-a      — Stage 1 (parallel, gate-A approval):
#                           non-OTP browser-form banks
#                           (Isracard, VisaCal, Discount, Max).
#   e2e-real-group-a-amex — Amex follow-on under gate-A approval;
#                           `needs: e2e-real-group-a` enforces
#                           Rule #16 (Amex never co-runs with
#                           Isracard).
#   e2e-real-group-b      — Stage 2 (parallel, gate-B approval):
#                           OTP browser-form banks
#                           (Hapoalim, Beinleumi).
#   e2e-real-group-c      — Stage 3 (parallel, gate-C approval):
#                           api-direct banks
#                           (OneZero, Pepper, PayBox).
#   dependency-review     — PR-only, independent.
#
# Each gate runs ONCE per PR — no overlap between validate and the
# real-bank matrices. Three approval clicks per PR (gate-A, gate-B,
# gate-C) — intentional revert of the 2026-05-13 single-gate
# consolidation so each category can be approved independently.
#
# Gates are mutually INDEPENDENT — all three become approvable as
# soon as `validate` + `dns-preflight` are green. The reviewer can
# release any group without waiting for another to finish; in
# practice that means Groups A, B and C can run in parallel once
# each has been clicked. The only ordering constraint is Rule #16
# inside Group A (Amex strictly after group-a's main matrix).
# ──────────────────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────────────────
  # Detect-changes fan-out gate. All downstream parallel jobs read
  # the four boolean outputs to short-circuit when the PR touches
  # only docs / CI scripts / non-src files. Splitting this from the
  # heavy jobs lets us declare them parallel without paying the
  # detect-changes cost N times.
  # ──────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      src: ${{ steps.changes.outputs.src }}
      md: ${{ steps.changes.outputs.md }}
      docs: ${{ steps.changes.outputs.docs }}
      pipeline_ts: ${{ steps.changes.outputs.pipeline_ts }}
      ci_scripts: ${{ steps.changes.outputs.ci_scripts }}
      deps: ${{ steps.changes.outputs.deps }}
      # Single-source-of-truth booleans for downstream `if:` conditions.
      # `trusted_event` — true unless this is a PR from a fork (untrusted secrets).
      # `real_gates_enabled` — true only when ALL prerequisites for running real-network /
      # CPU-heavy gates hold: trusted_event AND non-dependabot author AND src/ touched.
      # Use `needs.validate.outputs.<name>` from downstream jobs (validate re-emits these).
      trusted_event: ${{ steps.gate.outputs.trusted_event }}
      real_gates_enabled: ${{ steps.gate.outputs.real_gates_enabled }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect changed file groups
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash .github/scripts/ci/detect-changes.sh
      - name: Compute gate booleans
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          SRC_TOUCHED: ${{ steps.changes.outputs.src }}
        run: bash .github/scripts/ci/compute-gate-booleans.sh

  # ──────────────────────────────────────────────────────────────
  # Lint + types + docs canaries — independent of test jobs.
  # Runs whenever ANY of the conditionally-gated child steps could
  # fire, so the umbrella job's status reflects reality.
  # ──────────────────────────────────────────────────────────────
  lint-and-types:
    name: Lint & Types
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.md == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci_scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-node-deps
        if: needs.changes.outputs.src == 'true'
      - if: needs.changes.outputs.src == 'true'
        run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs

      - name: ESLint (warnings as errors)
        if: needs.changes.outputs.src == 'true'
        run: npx eslint src --max-warnings 0 --ignore-pattern '**/*.cjs'
      - name: Prettier check
        if: needs.changes.outputs.src == 'true'
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Lint Markdown
        if: needs.changes.outputs.md == 'true' || needs.changes.outputs.src == 'true'
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '*.md docs/**/*.md tasks/**/*.md'
          config: '.markdownlint.json'

      - name: Substitute {{BRANCH}} placeholders for Lychee
        if: needs.changes.outputs.md == 'true'
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          BRANCH_SED=$(printf '%s\n' "$BRANCH" | sed -e 's/[\\&|]/\\&/g')
          find docs README.md -name '*.md' -type f -print0 |
            xargs -0 sed -i "s|{{BRANCH}}|$BRANCH_SED|g"
      - name: Lychee link checker
        if: needs.changes.outputs.md == 'true'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.4.1
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --exclude 'sergienko4.github.io/israeli-bank-scrapers/'
            --exclude 'npmjs.com/package/'
            'README.md' 'docs/**/*.md'
          fail: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.docs == 'true'
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install mkdocs + plugins
        if: needs.changes.outputs.docs == 'true'
        run: pip install -r requirements-docs.txt
      - name: mkdocs build --strict (catches dead links / undefined refs)
        if: needs.changes.outputs.docs == 'true'
        run: python -m mkdocs build --strict

      - name: Docs coverage canary
        if: github.event_name == 'pull_request' && needs.changes.outputs.pipeline_ts == 'true'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/ci/docs-coverage.sh
      - name: Docs staleness canary
        if: github.event_name == 'pull_request' && needs.changes.outputs.src == 'true'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/ci/docs-staleness.sh

      - name: CI scripts smoke test
        if: needs.changes.outputs.ci_scripts == 'true'
        run: bash .github/scripts/ci/tests/scripts-smoke.sh

      - name: Type check
        if: needs.changes.outputs.src == 'true'
        run: npx tsc --noEmit

      - name: Acyclic-dependencies gate
        if: needs.changes.outputs.src == 'true'
        run: npm run lint:cycles

      # Tamper-guard: the ratchet above trusts the working-tree baseline, so a
      # PR could add a cycle AND widen import-cycles.baseline.json in one diff.
      # Assert the committed baseline only SHRINKS vs. the PR's base branch.
      - name: Cycle baseline tamper-guard
        if: github.event_name == 'pull_request' && needs.changes.outputs.src == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          base_file="${RUNNER_TEMP}/base-cycles-baseline.json"
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags origin "${BASE_REF}" || true
          fi
          git show "${BASE_SHA}:src/Tests/Tools/import-cycles.baseline.json" > "${base_file}" 2>/dev/null \
            || echo '{"note":"absent on base","cycleCount":0,"cycles":[]}' > "${base_file}"
          npx tsx src/Tests/Tools/lint-import-cycles.ts --guard-against "${base_file}"

      - name: Audit production dependencies
        if: needs.changes.outputs.src == 'true'
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        if: needs.changes.outputs.src == 'true'
        run: npm audit --audit-level=high
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Unit tests with coverage — parallel with the e2e and integration
  # jobs. Camoufox is NOT needed here (jest.pipeline.config.cjs
  # excludes the browser-driven suites).
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-test-runner
        with:
          camoufox: 'false'
      - name: Unit tests with coverage
        run: npm run test:pipeline
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: src/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # E2E factory tests — independent of Mode A / Mode B / e2e-mocked.
  # Also runs on dependency-only PRs (`deps`) so runtime-dep bumps that
  # touch no `src/` file are still validated against the real Camoufox
  # browser launch. See detect-changes.sh `deps` output.
  # ──────────────────────────────────────────────────────────────
  e2e-factory:
    name: E2E factory
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-test-runner
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - name: E2E factory tests
        run: npm run test:e2e-factory-tests -- --ci --verbose

  # ──────────────────────────────────────────────────────────────
  # E2E mocked tests — flake-prone under high worker counts; the
  # package.json `test:e2e:mock` script pins `--maxWorkers=2` to
  # avoid CPU-contention timeouts documented in the husky pre-commit
  # cycle (PRs #331+ cycle-4 cache-marker workaround).
  # Also runs on dependency-only PRs (`deps`): this is the gate that
  # exercises `browser.newContext` against the pinned Camoufox build,
  # so a playwright-core bump can no longer land UNvalidated (the
  # 1.61.0 `setDefaultViewport` regression slipped onto main because a
  # dependency-only PR skipped this job).
  # ──────────────────────────────────────────────────────────────
  e2e-mocked:
    name: E2E mocked
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-test-runner
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - name: E2E mocked tests
        run: npm run test:e2e:mock -- --ci --verbose

  # ──────────────────────────────────────────────────────────────
  # Bank integration coverage gate — fast structural lint.
  # ──────────────────────────────────────────────────────────────
  bank-coverage:
    name: Bank coverage gate
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-test-runner
        with:
          camoufox: 'false'
          tests-config: 'false'
      - name: Bank integration coverage gate
        run: npm run lint:bank-coverage

  # ──────────────────────────────────────────────────────────────
  # Integration Mode A + Mode B — Static HTML drive + Mirror Origin
  # (HARD GATE). Unified 7-bank × 2-mode matrix → 14 parallel runners.
  #
  # `INTEGRATION_BANK_FILTER` env var narrows the cross-bank
  # `describe.each(BANK_FIXTURE_EXPECTATIONS)` loops in
  # LoginFormDiscovery.integration.test.ts (Mode A) and
  # LoginNavigation.mirror.test.ts (Mode B) to the matrix bank — that
  # is where the wall-time wins come from (the cross-bank mirror cell
  # is ~60-90 s per bank vs ~130 s for all banks serial).
  #
  # Per-bank simulator tests (`*.modeB.test.ts`) and per-bank Mode A
  # drives (`*.modeA.test.ts`) run on every matrix cell — they are
  # individually fast (sub-second simulators, ~5-10 s per Playwright
  # static drive). The matrix gives fail-isolation (one bank's
  # regression does not red-block the other six) plus wall-time
  # reduction from parallelism. See Banks/IntegrationBankFilter.ts
  # for the filter implementation.
  # ──────────────────────────────────────────────────────────────
  integration:
    name: Integration Mode ${{ matrix.mode }} (${{ matrix.bank }})
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [a, b]
        bank:
          - amex
          - beinleumi
          - discount
          - hapoalim
          - isracard
          - max
          - visaCal
    env:
      INTEGRATION_BANK_FILTER: ${{ matrix.bank }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-test-runner
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Integration Mode ${{ matrix.mode }} — bank=${{ matrix.bank }}
        run: npm run test:integration:mode-${{ matrix.mode }}:bank

  # ──────────────────────────────────────────────────────────────
  # Build + dry-run publish — independent of test jobs (build can
  # succeed even if tests fail; the `validate` aggregator below
  # blocks merge when tests are red).
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-test-runner
        with:
          camoufox: 'false'
          tests-config: 'false'
      - uses: ./.github/actions/build-package
      - name: Dry-run publish (catch packaging errors early)
        run: npm pack --dry-run
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: lib/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Validate aggregator — preserves the external `Validate` status
  # context name AND the outputs that downstream jobs (e2e-smoke,
  # dns-preflight, e2e-real-group-*, dependency-review) consume.
  #
  # Pattern:
  #   `if: always()` so the aggregator runs even when one of the
  #   parallel jobs is skipped (e.g. docs-only PR → unit-tests is
  #   skipped, and `skipped` is an allowed result here).
  #
  #   Verify step fails the aggregator when ANY needed job reports
  #   `failure` or `cancelled`. `skipped` and `success` both pass —
  #   skipping is the legitimate outcome for src=false short-circuits.
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Validate
    needs:
      - changes
      - lint-and-types
      - unit-tests
      - e2e-factory
      - e2e-mocked
      - bank-coverage
      - integration
      - build
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      src_touched: ${{ needs.changes.outputs.src }}
      md_touched: ${{ needs.changes.outputs.md }}
      docs_touched: ${{ needs.changes.outputs.docs }}
      pipeline_ts_touched: ${{ needs.changes.outputs.pipeline_ts }}
      # Re-emit the computed gate booleans so downstream jobs that already `needs: validate`
      # don't have to add `changes` to their needs list. See compute-gate-booleans.sh for
      # the exact predicate semantics.
      trusted_event: ${{ needs.changes.outputs.trusted_event }}
      real_gates_enabled: ${{ needs.changes.outputs.real_gates_enabled }}
    steps:
      - name: Verify all gates green
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "Aggregator inputs:"
          echo "$NEEDS_JSON" | jq -r 'to_entries | map("  \(.key): \(.value.result)") | .[]'
          FAILED=$(echo "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result == "failure" or .value.result == "cancelled")) | map(.key) | join(",")')
          if [ -n "$FAILED" ]; then
            echo "::error::Validate gate FAILED — these jobs reported failure or cancelled: $FAILED"
            exit 1
          fi
          echo "✅ All parallel validate gates green (success or skipped)."

  # ──────────────────────────────────────────────────────────────
  # E2E Smoke Tests — matrix job, ONE bank per runner.
  #
  # Splits the previously-serial 17-bank smoke run into 17 parallel
  # ubuntu-latest runners. Each runner installs deps + camoufox once,
  # runs jest with --testNamePattern filtered to a single bank, and
  # returns. Wall time: ~3-5min matrix vs ~25min serial.
  #
  # Per-test timeout is 90s (SMOKE_TIMEOUT) so any bank-specific hang
  # cancels in 90s instead of the SCRAPE_TIMEOUT 15-min budget.
  # ──────────────────────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke (${{ matrix.bank }})
    # Skip when only docs/CI/non-src files were touched — keeps non-src
    # PRs from spinning up 17 runners they cannot meaningfully exercise.
    needs: validate
    if: needs.validate.outputs.src_touched == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        bank:
          - Hapoalim
          - Leumi
          - Mizrahi
          - Max
          - Isracard
          - Amex
          - VisaCal
          - Discount
          - Otsar Hahayal
          - Beinleumi
          - Mercantile
          - Massad
          - Yahav
          - Beyahad Bishvilha
          - Behatsdaa
          - Pagi
          - OneZero
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      # Smoke is INFORMATIONAL — bank-side rate limiting / SPA invalid-creds
      # rejection latency is bank-specific and outside this PR's scope.
      # `continue-on-error: true` keeps the matrix runner reporting its
      # outcome on the PR without blocking the merge gate.
      - name: E2E smoke (${{ matrix.bank }})
        continue-on-error: true
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --ci \
            --testPathPatterns='E2eSmoke' \
            --testNamePattern='${{ matrix.bank }} \(invalid login\)' \
            --testPathIgnorePatterns='/node_modules/' \
            --verbose \
            --forceExit

  # ──────────────────────────────────────────────────────────────
  # E2E Real (live banks, real credentials) — 3-stage / 3-group design.
  #
  # Gated on `needs: validate` so the cheap gates (lint, tsc, audit,
  # unit tests, e2e-mocked, build) run FIRST. Real-bank runs hit
  # actual bank websites with real credentials — running them only
  # after the mocked suite passes saves both wall time and bank-side
  # rate-limit budget when something is broken upstream.
  #
  #   Stage 0 — validate (lint/tsc/unit/e2e-mocked/build) MUST pass
  #   Stage 1 — dns-preflight (Israeli-bank hostname resolution).
  #
  # After Stage 1, all three category gates become approvable in
  # parallel. There is NO Stage 2/3/4 ordering — releasing one gate
  # does not require any other group to have run or finished.
  #
  #   Group A, gate-A (parallel runners):
  #     non-OTP browser-form banks
  #     — Isracard, VisaCal, Discount, Max
  #     + Amex follow-on (`needs: e2e-real-group-a`, Rule #16:
  #       Amex never co-runs with Isracard).
  #   Group B, gate-B (parallel runners):
  #     OTP browser-form banks
  #     — Hapoalim, Beinleumi
  #     (TELEGRAM_* secrets exposed for OTP delivery).
  #   Group C, gate-C (parallel runners):
  #     api-direct banks (no browser)
  #     — OneZero, Pepper, PayBox
  #     (TELEGRAM_* secrets exposed for OTP delivery).
  #
  # Three approval clicks per PR — one per category. The 3-gate
  # design lets each category be approved independently (e.g. skip
  # api-direct review when a PR only touches Isracard) and keeps
  # secrets scoped to the runners that need them. Updated 2026-05-26
  # to drop inter-group `needs:` so groups can also run concurrently
  # once each gate is released — the reviewer's click order does
  # not impose a serial pipeline.
  #
  # Wall time (gates approved in parallel ⇒ longest group dominates):
  #   validate                         ≈ 10–12 min
  #   dns-preflight                    ≈ 1–2 min
  #   max(Group A, Group B, Group C)   ≈ 9–11 min (Group A's
  #                                      Isracard+Amex chain wins)
  #
  # Same-repo PRs and manual dispatch only — secrets are not exposed
  # to forks (mirrors the prior gating of the now-removed E2eFull
  # step).
  # ──────────────────────────────────────────────────────────────
  # Each gate concentrates an `environment:` approval requirement on
  # ONE non-matrix job; the matrix below `needs:` the gate, so a
  # SINGLE approval click releases ALL banks in that category.
  # Without this indirection, putting `environment:` on a matrix
  # job would spawn one approval per matrix cell — N clicks per
  # gate instead of 1.
  #
  # The three gates reference DISTINCT environments
  # (`e2e-real-group-a`, `e2e-real-group-b`, `e2e-real-group-c`).
  # Sharing one environment across all three would let GitHub
  # batch them into a single approval prompt — fine for an
  # "approve everything" workflow but defeats per-category review.
  # Required repo setup: Settings → Environments → create each of
  # the three names above and attach reviewers; first runs against
  # missing environments auto-create them WITHOUT reviewers (the
  # workflow then passes through unapproved), so add reviewers
  # right after the first run if not pre-created.
  # ──────────────────────────────────────────────────────────────
  # DNS Preflight — Israeli bank resolution sanity check.
  #
  # Runs automatically on every PR push (NO approval gate) so the
  # reviewer can see whether the runner can reach Israeli bank
  # authoritative DNS BEFORE clicking the expensive E2E Real A
  # approval. Mirrors the resolv.conf override + fail-loud warmup
  # baked into the Real A and Real B jobs themselves; if this job
  # is RED, those jobs will also fail at their DNS step.
  #
  # Decoupled from the gate (no `needs:`) on purpose: occasionally
  # the reviewer may want to approve E2E Real even when this
  # preflight flaked (e.g. transient registry hiccup) — the gate
  # stays unblocked. Treat the preflight as informational.
  # ──────────────────────────────────────────────────────────────
  dns-preflight:
    name: DNS Preflight (IL bank resolution)
    needs: validate
    # Dependabot PRs SKIP the real-bank gate prerequisites — the validate
    # tier above (lint/types/unit/mocked/integration/build) is sufficient
    # to gate a dependency bump. The real-bank E2E happy-path remains
    # optional (manual approval) on human-authored PRs only.
    # `real_gates_enabled` = trusted_event AND non-dependabot AND src_touched
    # (see .github/scripts/ci/compute-gate-booleans.sh for the predicate).
    if: needs.validate.outputs.real_gates_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Force reliable DNS for Israeli bank resolution
        run: bash .github/scripts/ci/dns-warmup.sh

  e2e-real-group-a-gate:
    name: E2E Real A — approval gate
    # HARD dependency on `dns-preflight` (2026-05-17): gate is only
    # available for manual approval when ALL 12 Israeli bank hosts
    # resolve through the runner's Cloudflare/Google/Quad9 chain.
    # If preflight is RED, this gate sits unclickable so we don't
    # burn the E2E Real matrix on guaranteed-DNS failures.
    needs: [validate, dns-preflight]
    # See dns-preflight comment for `real_gates_enabled` semantics.
    if: needs.validate.outputs.real_gates_enabled == 'true'
    runs-on: ubuntu-latest
    # Per-group environment (2026-05-26): each gate references a
    # DISTINCT GitHub environment so the reviewer must click
    # "Approve" once per group. Sharing one environment across all
    # three gates would let GitHub batch them into a single approval
    # prompt — fine for "approve all" workflows but defeats the
    # purpose of per-category review. Required setup: repo
    # Settings → Environments → create `e2e-real-group-a` with the
    # desired reviewers; same for `e2e-real-group-b` /
    # `e2e-real-group-c`. Until the environments exist, GitHub
    # auto-creates them on first run WITHOUT reviewers (the workflow
    # passes through unapproved); flip-on protection by adding
    # reviewers to each environment afterwards.
    environment: e2e-real-group-a
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Gate released
        run: echo "Group A approved; matrix jobs may proceed."

  e2e-real-group-a:
    name: E2E Real A (${{ matrix.bank }})
    needs: e2e-real-group-a-gate
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Non-OTP browser-form banks. Amex runs separately
    # (`e2e-real-group-a-amex` below) under the SAME gate-A approval
    # but with `needs: e2e-real-group-a` so Rule #16 is enforced:
    # Amex never co-runs with Isracard.
    timeout-minutes: 30
    # Serialize same-bank runs across the entire repo (all PRs, all
    # branches). cancel-in-progress: false → newer queued runs wait
    # for the current one to finish instead of cancelling it. NOTE:
    # GitHub only queues ONE pending job per group; a 3rd queued job
    # for the same bank is cancelled (see PR body for rationale).
    concurrency:
      group: e2e-real-bank-${{ matrix.bank }}-${{ github.repository }}
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        bank:
          - Isracard
          - VisaCal
          - Discount
          - Max
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      # DNS override + warmup (single source of truth lives in
      # `.github/scripts/ci/dns-warmup.sh` — extracts the hostname
      # for THIS matrix bank only from `PipelineBankConfig.ts`).
      # Fail-loud — exits 1 if the host doesn't resolve.
      - name: Force reliable DNS for ${{ matrix.bank }}
        run: bash .github/scripts/ci/dns-warmup.sh ${{ matrix.bank }}
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: E2E real (${{ matrix.bank }})
        env:
          # LOG_LEVEL=trace makes the pipeline write per-run artefacts
          # (pipeline.log, screenshots, network dumps) under RUNS_ROOT.
          # Both pipeline.log AND network/*.json are PII-redacted at
          # write-time by the runtime layer (commit 3f1b966d: PiiRedactor
          # is wired into Pino's redact.censor + NetworkDiscovery's
          # dumpResponseBody routes through redactJsonBody/redactUrl).
          # Both file types are safe to upload; the failure-only artifact
          # below uploads them so we can debug auto-discovery + endpoint
          # selection (e.g. Max's "scrape skipped — No txn URL" case
          # needs the 71 captured network URLs to triage).
          # Screenshots are still excluded — PNGs cannot be reliably
          # redacted and may capture rendered PII text.
          LOG_LEVEL: ${{ inputs.log_level || 'trace' }}
          RUNS_ROOT: /tmp/runs
          # Non-OTP browser-form banks only — no OTP / TELEGRAM
          # secrets exposed to this runner. OTP banks live in Group B;
          # api-direct banks in Group C.
          ISRACARD_ID: ${{ secrets.ISRACARD_ID }}
          ISRACARD_CARD6DIGITS: ${{ secrets.ISRACARD_CARD6DIGITS }}
          ISRACARD_PASSWORD: ${{ secrets.ISRACARD_PASSWORD }}
          VISACAL_USERNAME: ${{ secrets.VISACAL_USERNAME }}
          VISACAL_PASSWORD: ${{ secrets.VISACAL_PASSWORD }}
          DISCOUNT_ID: ${{ secrets.DISCOUNT_ID }}
          DISCOUNT_PASSWORD: ${{ secrets.DISCOUNT_PASSWORD }}
          DISCOUNT_NUM: ${{ secrets.DISCOUNT_NUM }}
          MAX_USERNAME: ${{ secrets.MAX_USERNAME }}
          MAX_PASSWORD: ${{ secrets.MAX_PASSWORD }}

        # Filter to happy-path test only. Each E2eReal/<Bank>.e2e-real file
        # has two it() blocks: 'scrapes transactions successfully' (happy)
        # and 'fails with invalid credentials' (already covered by smoke
        # matrix). Running both here re-tests invalid-creds against the
        # same bank twice per PR — testNamePattern eliminates the duplicate.
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --ci \
            --testPathPatterns="E2eReal/${{ matrix.bank }}\\.e2e-real" \
            --testNamePattern='scrapes transactions successfully' \
            --testPathIgnorePatterns='/node_modules/' \
            --verbose \
            --forceExit
      - name: Upload diagnostics on failure (${{ matrix.bank }})
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-real-${{ matrix.bank }}-diag-${{ github.run_id }}
          # pipeline.log + network/*.json — both PII-redacted at write
          # time by the runtime layer (commit 3f1b966d). Network dumps
          # are required to triage auto-discovery failures (which URL
          # got picked out of the captured set, what response shape).
          # Pre-auth screenshots (init/home only) included since the
          # bank page carries no user data before LOGIN — needed to
          # triage WAF / challenge-wall hypotheses without speculation.
          # LOGIN / OTP / DASHBOARD / SCRAPE screenshots remain excluded.
          path: |
            /tmp/runs/pipeline/**/pipeline.log
            /tmp/runs/pipeline/**/network/*.json
            /tmp/runs/pipeline/**/screenshots/*.png
          retention-days: 7
          if-no-files-found: warn
      - name: Upload full diagnostics to private store (${{ matrix.bank }})
        if: failure()
        env:
          OCI_DIAG_PAR_URL: ${{ secrets.OCI_DIAG_PAR_URL }}
          DIAG_BANK: ${{ matrix.bank }}
          RUN_TAG: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          # Best-effort upload of the FULL run dir -- including post-auth
          # screenshots diverted to private/ by SafeScreenshot.ts -- to the
          # access-controlled OCI bucket via a write-only pre-authenticated
          # request (AnyObjectWrite = create/overwrite only; no read, list,
          # or delete; bucket NoPublicAccess; 3-day TTL). Never touches the
          # public artifact above. Skips cleanly when the secret is absent
          # (forks / external PRs) so it can never fail the job.
          if [ -z "${OCI_DIAG_PAR_URL:-}" ]; then
            echo "OCI_DIAG_PAR_URL not configured -- skipping private upload."
            exit 0
          fi
          root=/tmp/runs/pipeline
          [ -d "$root" ] || { echo "no run dir -- nothing to upload."; exit 0; }
          find "$root" -type f -print0 | while IFS= read -r -d '' f; do
            obj="${DIAG_BANK}/${RUN_TAG}/${f#"$root"/}"
            if curl -sS --fail-with-body --retry 3 --retry-delay 2 -T "$f" "${OCI_DIAG_PAR_URL}${obj}"; then
              echo "uploaded ${obj}"
            else
              echo "WARN: upload failed for ${obj}"
            fi
          done
          echo "private diagnostics upload complete."
      # ── Cooldown hold (post-run slot retention) ──
      # Holds the job's repo-wide concurrency.group slot
      # (e2e-real-bank-<bank>-<repo>) for 600 s so the NEXT same-bank
      # run — across ANY PR or workflow — starts at least 10 min after
      # this run completed. WAF risk-score decay window observed: 15-60
      # min for Hapoalim image-puzzle escalation; 10 min is the minimum
      # that meaningfully reduces repeat-trigger probability without
      # over-burning runner time. Always runs (success OR failure) so
      # repeated failures (which often indicate WAF heat) also throttle.
      # Replaces the actions/cache-backed timestamp dance per CR review
      # on PR #300 (cache was PR-branch scoped → cross-PR enforcement
      # unreliable; concurrency.group + post-run sleep is reliable).
      - name: Cooldown hold (${{ matrix.bank }})
        if: always()
        run: |
          echo "[cooldown-hold] sleeping 600 s to hold concurrency slot for ${{ matrix.bank }}"
          sleep 600
          echo "[cooldown-hold] done; slot freed for next queued same-bank job"

  # Amex follow-on under gate-A approval. Rule #16: Amex never
  # co-runs with Isracard, so we `needs: e2e-real-group-a` to make
  # Amex run STRICTLY after the Group A matrix finishes. No
  # additional approval click — gate-A's release applies.

  e2e-real-group-a-amex:
    name: E2E Real A (${{ matrix.bank }})
