name: PR Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'tsup.config.ts'
      - 'jest.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc.cjs'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'tsup.config.ts'
      - 'jest.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc.cjs'
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level for E2E real tests (info, debug, trace)'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - trace

concurrency:
  group: pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# Job DAG (cheap-gates-first, fail-fast):
#
#   validate           — lint → tsc → audit → unit tests →
#                        e2e factory + e2e mocked → build →
#                        upload artifacts.
#                        MOCKED tests live here so failures are
#                        caught BEFORE we burn real-bank capacity.
#   e2e-smoke          — 17-bank matrix (invalid-creds, parallel).
#   e2e-real-group-a   — `needs: validate`. Stage 1 of real-bank
#                        scrapes; banks within run in parallel.
#   e2e-real-group-b   — `needs: e2e-real-group-a`. Stage 2 (parallel
#                        within); enforces Rule #16 (Amex never
#                        co-runs with Isracard) by running strictly
#                        after Group A completes.
#   dependency-review  — PR-only, independent.
#
# Each gate runs ONCE per PR — no overlap between validate and the
# real-bank matrices (the legacy E2eFull validate-step that
# duplicated the matrix has been removed).
# ──────────────────────────────────────────────────────────────

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs

      # ── Lint & Format ──
      - name: ESLint (warnings as errors)
        run: npx eslint src --max-warnings 0 --ignore-pattern '**/*.cjs'
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '*.md docs/**/*.md tasks/**/*.md'
          config: '.markdownlint.json'

      # ── Type Check ──
      - name: Type check
        run: npx tsc --noEmit

      # ── Audit ──
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Unit Tests ──
      - name: Unit tests with coverage
        run: npm run test:pipeline

      # ── E2E Factory Tests ──
      - name: E2E factory tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='Tests/E2e\.test' --verbose --forceExit

      # ── E2E Smoke Tests are now a separate matrix job (e2e-smoke). ──
      # See `e2e-smoke` job below — runs invalid-credential checks for each
      # bank in its own ubuntu-latest runner in parallel. Wall time drops
      # from ~25min serial to ~3-5min matrix.

      # ── E2E Mocked Tests ──
      - name: E2E mocked tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='E2eMocked' --testPathIgnorePatterns='/node_modules/' --verbose --forceExit

      # ── E2E Real Bank Tests (real credentials) ──
      # Moved out of this job into the dedicated 2-group matrix below
      # (`e2e-real-group-a` → `e2e-real-group-b`). This avoids running
      # the same real-bank scrapes twice on every PR (was: also a
      # legacy `E2eFull` step here that overlapped the matrix).
      # `npm run test:e2e:full` remains available for manual runs of
      # the residual Mercantile coverage that lives in src/Tests/E2eFull/.

      # ── Build ──
      - uses: ./.github/actions/build-package
      - name: Dry-run publish (catch packaging errors early)
        run: npm pack --dry-run

      # ── Upload Artifacts ──
      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-output
          path: lib/
          retention-days: 7
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: src/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # E2E Smoke Tests — matrix job, ONE bank per runner.
  #
  # Splits the previously-serial 17-bank smoke run into 17 parallel
  # ubuntu-latest runners. Each runner installs deps + camoufox once,
  # runs jest with --testNamePattern filtered to a single bank, and
  # returns. Wall time: ~3-5min matrix vs ~25min serial.
  #
  # Per-test timeout is 90s (SMOKE_TIMEOUT) so any bank-specific hang
  # cancels in 90s instead of the SCRAPE_TIMEOUT 15-min budget.
  # ──────────────────────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke (${{ matrix.bank }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        bank:
          - Hapoalim
          - Leumi
          - Mizrahi
          - Max
          - Isracard
          - Amex
          - VisaCal
          - Discount
          - Otsar Hahayal
          - Beinleumi
          - Mercantile
          - Massad
          - Yahav
          - Beyahad Bishvilha
          - Behatsdaa
          - Pagi
          - OneZero
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      # Smoke is INFORMATIONAL — bank-side rate limiting / SPA invalid-creds
      # rejection latency is bank-specific and outside this PR's scope.
      # `continue-on-error: true` keeps the matrix runner reporting its
      # outcome on the PR without blocking the merge gate.
      - name: E2E smoke (${{ matrix.bank }})
        continue-on-error: true
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --ci \
            --testPathPatterns='E2eSmoke' \
            --testNamePattern='${{ matrix.bank }} \(invalid login\)' \
            --testPathIgnorePatterns='/node_modules/' \
            --verbose \
            --forceExit

  # ──────────────────────────────────────────────────────────────
  # E2E Real (live banks, real credentials) — 3-stage / 3-group design.
  #
  # Gated on `needs: validate` so the cheap gates (lint, tsc, audit,
  # unit tests, e2e-mocked, build) run FIRST. Real-bank runs hit
  # actual bank websites with real credentials — running them only
  # after the mocked suite passes saves both wall time and bank-side
  # rate-limit budget when something is broken upstream.
  #
  #   Stage 0 — validate (lint/tsc/unit/e2e-mocked/build) MUST pass
  #   Stage 1a — Group A (parallel runners): Isracard, VisaCal, Discount, Max
  #   Stage 1b — Group OTP (SEQUENTIAL, one runner per bank, fixed order):
  #              OneZero → Beinleumi → Hapoalim
  #   Stage 2  — Group B (parallel runners): Amex   (needs: group-a)
  #
  # Why the OTP group is sequential: the three OTP-gated banks share a
  # single Telegram bot/chat for OTP delivery. Even with the
  # non-destructive `offset=0` polling design in `TelegramOtpFetcher.ts`,
  # running them in parallel matrix runners has historically surfaced
  # cross-fetcher contention (Beinleumi-prompt-during-Hapoalim symptom,
  # 2026-05-12). `max-parallel: 1` serialises the matrix so only ONE
  # OTP fetcher is ever active against the bot at a time; each
  # combination still runs on its own fresh ubuntu-latest runner
  # (== its own container) — same isolation as Group A's parallel
  # banks, just dispatched serially in the listed matrix order.
  #
  # Why Amex stays alone in Group B (`needs: e2e-real-group-a`):
  # project Rule #16 forbids Amex and Isracard from running
  # concurrently. The OTP group runs independently of Amex — different
  # bank, no shared IP-throttling risk — so the OTP group does NOT
  # gate Group B.
  #
  # Wall time:
  #   validate (Stage 0)      ≈ 10–12 min
  #   max(Group A banks)      ≈ 7 min   (4 in parallel, longest is Isracard)
  #   Group OTP (serial × 3)  ≈ 9–12 min (3 × ~3-4 min each — OTP latency dominates)
  #   Group B (Amex)          ≈ 7 min
  #   Group A and Group OTP run in parallel; Group B follows Group A.
  #
  # Same-repo PRs and manual dispatch only — secrets are not exposed to
  # forks (mirrors the prior gating of the now-removed E2eFull step).
  # ──────────────────────────────────────────────────────────────
  e2e-real-group-a:
    name: E2E Real A (${{ matrix.bank }})
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        bank:
          - Isracard
          - VisaCal
          - Discount
          - Max
          # Hapoalim moved back here from `e2e-real-otp` group (2026-05-13)
          # to isolate the regression vector. Hapoalim uses
          # `.withOtpFill(false)` (device-remembered session, no SMS
          # interception required), so the OTP environment gate /
          # Telegram bot routing was unnecessary infrastructure. The
          # matrix move (commit bb0f4475 on 2026-05-12) shifted Hapoalim
          # to a sequential post-approval slot and the test has been
          # failing intermittently since. Restoring the original
          # parallel Group A position to confirm the matrix path is
          # the discriminator.
          - Hapoalim
          # OTP-gated banks (Hapoalim / Beinleumi / OneZero) moved
          # to the dedicated `e2e-real-otp` job below — sequential
          # execution (max-parallel: 1) eliminates cross-fetcher
          # contention on the shared Telegram bot.
          # Pepper deliberately omitted — its test file is opt-in via
          # `PEPPER_E2E_OPT_IN=1` due to Play Integrity attestation
          # gating (see comment in Pepper.e2e-real.test.ts). Bank-regex
          # is wired in code; adding to matrix is one-line when the
          # Play Integrity work lands.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: E2E real (${{ matrix.bank }})
        env:
          # LOG_LEVEL=trace makes the pipeline write per-run artefacts
          # (pipeline.log, screenshots, network dumps) under RUNS_ROOT.
          # Both pipeline.log AND network/*.json are PII-redacted at
          # write-time by the runtime layer (commit 3f1b966d: PiiRedactor
          # is wired into Pino's redact.censor + NetworkDiscovery's
          # dumpResponseBody routes through redactJsonBody/redactUrl).
          # Both file types are safe to upload; the failure-only artifact
          # below uploads them so we can debug auto-discovery + endpoint
          # selection (e.g. Max's "scrape skipped — No txn URL" case
          # needs the 71 captured network URLs to triage).
          # Screenshots are still excluded — PNGs cannot be reliably
          # redacted and may capture rendered PII text.
          LOG_LEVEL: ${{ inputs.log_level || 'trace' }}
          RUNS_ROOT: /tmp/runs
          ISRACARD_ID: ${{ secrets.ISRACARD_ID }}
          ISRACARD_CARD6DIGITS: ${{ secrets.ISRACARD_CARD6DIGITS }}
          ISRACARD_PASSWORD: ${{ secrets.ISRACARD_PASSWORD }}
          VISACAL_USERNAME: ${{ secrets.VISACAL_USERNAME }}
          VISACAL_PASSWORD: ${{ secrets.VISACAL_PASSWORD }}
          DISCOUNT_ID: ${{ secrets.DISCOUNT_ID }}
          DISCOUNT_PASSWORD: ${{ secrets.DISCOUNT_PASSWORD }}
          DISCOUNT_NUM: ${{ secrets.DISCOUNT_NUM }}
          MAX_USERNAME: ${{ secrets.MAX_USERNAME }}
          MAX_PASSWORD: ${{ secrets.MAX_PASSWORD }}
          # Hapoalim secrets follow the bank back to Group A.
          # `withOtpFill(false)` means no OTP retriever is needed —
          # the Telegram bot stays in the OTP group for Beinleumi/OneZero.
          HAPOALIM_USER_CODE: ${{ secrets.HAPOALIM_USER_CODE }}
          HAPOALIM_PASSWORD: ${{ secrets.HAPOALIM_PASSWORD }}
          # OTP-gated banks (Hapoalim / Beinleumi / OneZero) and the
          # Telegram bot secrets are wired into `e2e-real-otp` below;
          # this job no longer touches them so a missing OTP secret
          # cannot poison the non-OTP banks' runners.

        # Filter to happy-path test only. Each E2eReal/<Bank>.e2e-real file
        # has two it() blocks: 'scrapes transactions successfully' (happy)
        # and 'fails with invalid credentials' (already covered by smoke
        # matrix). Running both here re-tests invalid-creds against the
        # same bank twice per PR — testNamePattern eliminates the duplicate.
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --ci \
            --testPathPatterns="E2eReal/${{ matrix.bank }}\\.e2e-real" \
            --testNamePattern='scrapes transactions successfully' \
            --testPathIgnorePatterns='/node_modules/' \
            --verbose \
            --forceExit
      - name: Upload diagnostics on failure (${{ matrix.bank }})
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-real-${{ matrix.bank }}-diag-${{ github.run_id }}
          # pipeline.log + network/*.json — both PII-redacted at write
          # time by the runtime layer (commit 3f1b966d). Network dumps
          # are required to triage auto-discovery failures (which URL
          # got picked out of the captured set, what response shape).
          # Pre-auth screenshots (init/home only) included since the
          # bank page carries no user data before LOGIN — needed to
          # triage WAF / challenge-wall hypotheses without speculation.
          # LOGIN / OTP / DASHBOARD / SCRAPE screenshots remain excluded.
          path: |
            /tmp/runs/pipeline/**/pipeline.log
            /tmp/runs/pipeline/**/network/*.json
            /tmp/runs/pipeline/**/screenshots/*-init-*.png
            /tmp/runs/pipeline/**/screenshots/*-home-*.png
          retention-days: 7
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # E2E Real OTP — sequential matrix, one runner per bank.
  #
  # `max-parallel: 1` makes GitHub Actions dispatch matrix
  # combinations one at a time, in the listed order. Each
  # combination still runs on its own fresh ubuntu-latest runner
  # (== its own container — same isolation as Group A) — only the
  # dispatch is serialised. This eliminates Telegram-bot
  # cross-fetcher contention: at most one fetcher is ever active
  # against the bot, so the queue belongs to that fetcher alone for
  # the lifetime of the run.
  #
  # Order fixed (OneZero → Beinleumi → Hapoalim) so flake patterns
  # are diff-stable across PRs — Hapoalim's HOME-PRE flake is
  # easier to attribute when it always lands in the last slot.
  # ──────────────────────────────────────────────────────────────
  e2e-real-otp:
    name: E2E Real OTP (${{ matrix.bank }})
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # `environment: e2e-real-otp` gates the job behind a manual
    # approval per the project's same-bot-shared-by-3-banks design.
    # OTP-gated banks need a human to type the SMS code into Telegram
    # within a 3-min window — kicking them off automatically on every
    # PR push burns the operator's attention with no signal. Configure
    # the environment at
    # https://github.com/sergienko4/israeli-bank-scrapers/settings/environments
    # with "Required reviewers" set to the maintainer; the matrix
    # combinations (OneZero → Beinleumi → Hapoalim) will then queue
    # in the "Waiting" state until the maintainer clicks Approve.
    # If the environment hasn't been created yet, the job fails
    # closed (no run) instead of silently dispatching — that's the
    # safe default while the operator is offline.
    environment: e2e-real-otp
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        bank:
          - OneZero
          - Beinleumi
          # Hapoalim moved out of this group (2026-05-13) — it uses
          # `withOtpFill(false)` so the OTP env gate / Telegram bot
          # routing was never required. The sequential `max-parallel: 1`
          # slot here (Hapoalim ran 3rd, post-approval) correlated with
          # the recent CI failures; restored to parallel Group A above.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: E2E real OTP (${{ matrix.bank }})
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'trace' }}
          RUNS_ROOT: /tmp/runs
          # HAPOALIM_USER_CODE / HAPOALIM_PASSWORD removed from this
          # group — Hapoalim moved to Group A above (`withOtpFill(false)`,
          # no SMS interception needed).
          BEINLEUMI_USERNAME: ${{ secrets.BEINLEUMI_USERNAME }}
          BEINLEUMI_PASSWORD: ${{ secrets.BEINLEUMI_PASSWORD }}
          ONEZERO_EMAIL: ${{ secrets.ONEZERO_EMAIL }}
          ONEZERO_PASSWORD: ${{ secrets.ONEZERO_PASSWORD }}
          ONEZERO_PHONE_NUMBER: ${{ secrets.ONEZERO_PHONE_NUMBER }}
          ONEZERO_OTP_LONG_TERM: ${{ secrets.ONEZERO_OTP_LONG_TERM }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --ci \
            --testPathPatterns="E2eReal/${{ matrix.bank }}\\.e2e-real" \
            --testNamePattern='scrapes transactions successfully' \
            --testPathIgnorePatterns='/node_modules/' \
            --verbose \
            --forceExit
      - name: Upload diagnostics on failure (${{ matrix.bank }})
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-real-otp-${{ matrix.bank }}-diag-${{ github.run_id }}
          # Same pre-auth screenshot policy as Group A — init + home only
          # so we can triage homepage WAF / challenge-wall failures
          # (Hapoalim CI race investigated 2026-05-13) with visual proof.
          path: |
            /tmp/runs/pipeline/**/pipeline.log
            /tmp/runs/pipeline/**/network/*.json
            /tmp/runs/pipeline/**/screenshots/*-init-*.png
            /tmp/runs/pipeline/**/screenshots/*-home-*.png
          retention-days: 7
          if-no-files-found: warn

  e2e-real-group-b:
    name: E2E Real B (${{ matrix.bank }})
    needs: e2e-real-group-a
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        bank:
          - Amex
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: E2E real (${{ matrix.bank }})
        env:
          # Same trace + RUNS_ROOT setup as Group A — failure artifact
          # below relies on /tmp/runs being populated when LOG_LEVEL=trace.
          LOG_LEVEL: ${{ inputs.log_level || 'trace' }}
          RUNS_ROOT: /tmp/runs
          AMEX_ID: ${{ secrets.AMEX_ID }}
          AMEX_CARD6DIGITS: ${{ secrets.AMEX_CARD6DIGITS }}
          AMEX_PASSWORD: ${{ secrets.AMEX_PASSWORD }}
        # Happy-path filter — see Group A note above; same rationale.
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --ci \
            --testPathPatterns="E2eReal/${{ matrix.bank }}\\.e2e-real" \
            --testNamePattern='scrapes transactions successfully' \
            --testPathIgnorePatterns='/node_modules/' \
            --verbose \
            --forceExit
      - name: Upload diagnostics on failure (${{ matrix.bank }})
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-real-${{ matrix.bank }}-diag-${{ github.run_id }}
          # Same pre-auth screenshot policy as Group A — init + home only
          # so we can triage homepage WAF / challenge-wall failures
          # (Hapoalim CI race investigated 2026-05-13) with visual proof.
          path: |
            /tmp/runs/pipeline/**/pipeline.log
            /tmp/runs/pipeline/**/network/*.json
            /tmp/runs/pipeline/**/screenshots/*-init-*.png
            /tmp/runs/pipeline/**/screenshots/*-home-*.png
          retention-days: 7
          if-no-files-found: warn

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Pinned to main HEAD pending v4.10.0 release: v4.9.0 still
      # targets `node20` (deprecated 2025-09-19); main has `node24`.
      - uses: actions/dependency-review-action@9ae8e67b9f0be9e9903db0d81c2580dbc9570216 # main 2026-05-08
        with:
          fail-on-severity: moderate
          allow-licenses: >-
            MIT, ISC, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD,
            BlueOak-1.0.0, CC0-1.0, CC-BY-3.0, CC-BY-4.0, MPL-2.0,
            Python-2.0, WTFPL, Unlicense
          allow-dependencies-licenses: >-
            pkg:npm/playwright-core,
            pkg:githubactions/SonarSource/sonarqube-scan-action
