name: PR Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'tsup.config.ts'
      - 'jest.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc.cjs'
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# Job DAG:
#
#   setup → [lint, type-check, unit-tests, e2e-smoke, e2e-mocked, audit, dep-review]
#                                                                          │
#           [lint, type-check] ─────────────────────────────────────→ build
# ──────────────────────────────────────────────────────────────

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs

  lint:
    name: Lint & Format
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-deps
      - name: ESLint (warnings as errors)
        run: npx eslint src --max-warnings 0 --ignore-pattern '**/*.cjs'
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22
        with:
          globs: '*.md docs/**/*.md tasks/**/*.md'
          config: '.markdownlint.json'

  type-check:
    name: Type Check
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-deps
      - run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Run tests with coverage
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --coverage --coverageReporters=text --coverageReporters=lcov --testPathIgnorePatterns='E2eReal/' --testPathIgnorePatterns='E2eMocked/'
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: src/coverage/
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke Tests
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Run E2E smoke tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='tests/e2e\.test' --verbose

  e2e-mocked:
    name: E2E Mocked Tests
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Run mocked E2E tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --testPathPatterns='E2eMocked' --testPathIgnorePatterns='/node_modules/' --verbose

  audit:
    name: npm Audit
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-deps
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  dependency-review:
    name: Dependency Review
    needs: [setup]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0

  build:
    name: Build Verification
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-package
