name: SonarCloud

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'sonar-project.properties'
      - '.github/workflows/sonarcloud.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'sonar-project.properties'
      - '.github/workflows/sonarcloud.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: {}

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node + Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Install Camoufox
        uses: ./.github/actions/install-camoufox
        with:
          gh-token: ${{ github.token }}

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage --collectCoverageFrom='Scrapers/Pipeline/**/*.ts' --coveragePathIgnorePatterns='Pipeline/Banks/' --coverageDirectory=coverage
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Verify SonarCloud secrets
        run: |
          set -euo pipefail
          missing=""
          [ -z "${SONAR_TOKEN}" ] && missing="${missing} SONAR_TOKEN"
          [ -z "${SONAR_ORG}" ] && missing="${missing} SONAR_ORG"
          [ -z "${SONAR_PROJECT_KEY}" ] && missing="${missing} SONAR_PROJECT_KEY"
          if [ -n "${missing}" ]; then
            echo "::error::Missing secrets:${missing} — add in Settings → Secrets → Actions."
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
