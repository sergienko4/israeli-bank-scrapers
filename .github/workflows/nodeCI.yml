name: PR Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - '.babelrc.js'
      - 'babel.config.js'
      - 'jest.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc.js'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: ESLint (warnings as errors)
        run: npx eslint src --max-warnings 0
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22
        with:
          globs: '*.md docs/**/*.md tasks/**/*.md'
          config: '.markdownlint.json'

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx ncp src/Tests/.tests-config.tpl.js src/Tests/.tests-config.js
      - name: Run tests with coverage
        run: npx jest --ci --coverage --coverageReporters=text --coverageReporters=lcov
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-report
          path: src/coverage/
          retention-days: 7

  build:
    name: Build Verification
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - run: npx rimraf lib
      - run: npx tsc --emitDeclarationOnly
      - run: npx babel src --out-dir lib --extensions ".ts" --source-maps inline --verbose
      - run: npx rimraf lib/tests
      - name: Verify build output
        run: |
          test -f lib/index.js || (echo "ERROR: lib/index.js not found" && exit 1)
          test -f lib/index.d.ts || (echo "ERROR: lib/index.d.ts not found" && exit 1)

  security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0

  audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true
