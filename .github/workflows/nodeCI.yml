name: PR Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'tsup.config.ts'
      - 'jest.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc.cjs'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: ESLint (warnings as errors)
        run: npx eslint src --max-warnings 0 --ignore-pattern '**/*.cjs'
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22
        with:
          globs: '*.md docs/**/*.md tasks/**/*.md'
          config: '.markdownlint.json'

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Cache Camoufox browser
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            camoufox-
      - name: Install Camoufox browser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d ~/.cache/camoufox ] && ls ~/.cache/camoufox/*/camoufox 2>/dev/null; then
            echo "Camoufox already cached, skipping fetch"
          else
            echo "Cache miss — attempting camoufox-js fetch..."
            if npx @hieutran094/camoufox-js fetch; then
              echo "Camoufox installed via camoufox-js"
            else
              echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
              ASSET_DIR=$(mktemp -d)
              gh release download --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
              mkdir -p ~/.cache/camoufox
              unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
              rm -rf "$ASSET_DIR"
              ls ~/.cache/camoufox/*/camoufox || (echo "ERROR: Camoufox binary not found after fallback" && exit 1)
              echo "Camoufox installed via authenticated gh fallback"
            fi
          fi
      - run: npx ncp src/Tests/.tests-config.tpl.cjs src/Tests/.tests-config.cjs
      - name: Run tests with coverage
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --ci --coverage --coverageReporters=text --coverageReporters=lcov --testPathIgnorePatterns='E2eReal/' --testPathIgnorePatterns='E2eMocked/'
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: src/coverage/
          retention-days: 7

  build:
    name: Build Verification
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Cache Camoufox browser
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            camoufox-
      - name: Install Camoufox browser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d ~/.cache/camoufox ] && ls ~/.cache/camoufox/*/camoufox 2>/dev/null; then
            echo "Camoufox already cached, skipping fetch"
          else
            echo "Cache miss — attempting camoufox-js fetch..."
            if npx @hieutran094/camoufox-js fetch; then
              echo "Camoufox installed via camoufox-js"
            else
              echo "camoufox-js fetch failed (likely rate-limited) — falling back to gh release download"
              ASSET_DIR=$(mktemp -d)
              gh release download --repo daijro/camoufox --pattern 'camoufox-*-lin.x86_64.zip' --dir "$ASSET_DIR" --clobber
              mkdir -p ~/.cache/camoufox
              unzip -o "$ASSET_DIR"/*.zip -d ~/.cache/camoufox/
              rm -rf "$ASSET_DIR"
              ls ~/.cache/camoufox/*/camoufox || (echo "ERROR: Camoufox binary not found after fallback" && exit 1)
              echo "Camoufox installed via authenticated gh fallback"
            fi
          fi
      - run: npx tsup
      - run: npx rimraf lib/Common lib/Scrapers lib/Tests
      - name: Verify build output
        run: |
          test -f lib/index.cjs || (echo "ERROR: lib/index.cjs not found" && exit 1)
          test -f lib/index.mjs || (echo "ERROR: lib/index.mjs not found" && exit 1)
          test -f lib/index.d.ts || (echo "ERROR: lib/index.d.ts not found" && exit 1)
          test -f lib/index.d.cts || (echo "ERROR: lib/index.d.cts not found" && exit 1)
      - name: Validate package exports
        run: npm run check-exports

  # CodeQL moved to dedicated .github/workflows/codeql.yml (runs on all PRs, not just code changes)

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0

  audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true
